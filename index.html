<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>تتبع أجهزة POS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh;direction:rtl}

/* Header */
.top{background:#161b27;border-bottom:1px solid #1e2a3d;padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.logo{font-size:18px;font-weight:800;color:#60a5fa;letter-spacing:1px}
.status-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;margin-right:4px;display:inline-block}
.status-txt{font-size:12px;color:#64748b}

/* Search */
.search-wrap{padding:16px 16px 8px}
.search-box{width:100%;background:#1e2535;border:1.5px solid #2d3748;border-radius:10px;padding:11px 16px;font-size:15px;color:#e2e8f0;outline:none;transition:border .2s;direction:rtl}
.search-box:focus{border-color:#60a5fa}
.search-box::placeholder{color:#4a5568}

/* Filters */
.filters{padding:6px 16px 10px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.flt{background:#1e2535;border:1px solid #2d3748;border-radius:20px;padding:5px 12px;font-size:12px;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:all .2s}
.flt.on{background:#1d4ed8;border-color:#3b82f6;color:#fff}

/* Stats bar */
.stats{display:flex;gap:0;border-bottom:1px solid #1e2a3d;background:#161b27}
.stat{flex:1;padding:10px;text-align:center;border-left:1px solid #1e2a3d}
.stat:last-child{border-left:none}
.stat-n{font-size:18px;font-weight:800;color:#60a5fa}
.stat-l{font-size:10px;color:#64748b;margin-top:2px}

/* Results */
.results{padding:10px 12px}
.no-results{text-align:center;color:#4a5568;padding:60px 20px;font-size:14px}

/* Card */
.card{background:#161b27;border:1px solid #1e2a3d;border-radius:12px;margin-bottom:10px;overflow:hidden;cursor:pointer;transition:border-color .2s}
.card:hover{border-color:#3b82f6}
.card-header{padding:12px 14px;display:flex;align-items:flex-start;gap:10px}
.card-name{font-size:14px;font-weight:700;color:#e2e8f0;flex:1;line-height:1.3}
.card-addr{font-size:11px;color:#64748b;margin-top:2px}
.badge{padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap}
.b-active{background:rgba(34,197,94,.15);color:#22c55e;border:1px solid rgba(34,197,94,.3)}
.b-new{background:rgba(96,165,250,.15);color:#60a5fa;border:1px solid rgba(96,165,250,.3)}
.b-wait{background:rgba(251,191,36,.12);color:#fbbf24;border:1px solid rgba(251,191,36,.25)}
.card-body{padding:0 14px 12px;display:flex;flex-wrap:wrap;gap:6px}
.info-chip{display:flex;align-items:center;gap:5px;background:#0f1117;border:1px solid #1e2a3d;border-radius:8px;padding:4px 9px;font-size:12px;color:#94a3b8}
.info-chip.pos{border-color:#1d4ed8;color:#93c5fd;background:rgba(29,78,216,.1)}
.info-chip.sim{border-color:#065f46;color:#34d399;background:rgba(6,95,70,.12)}
.info-chip.tech{border-color:#374151;color:#9ca3af}
.info-chip.date{color:#6b7280}
.info-chip .ic{font-size:13px}

/* History inside card */
.card-hist{border-top:1px solid #1e2a3d;overflow:hidden;display:none}
.card-hist.open{display:block}
.hist-item{padding:9px 14px;border-bottom:1px solid #0f1117;display:flex;flex-direction:column;gap:4px}
.hist-item:last-child{border-bottom:none}
.hist-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hist-date{font-size:11px;color:#4a5568}
.hist-tech{font-size:11px;color:#6b7280}
.hist-reason{font-size:11px;color:#7dd3fc}
.hist-note{font-size:10px;color:#4a5568;margin-top:2px}

/* SIM converted label */
.sim-orig{font-size:9px;color:#374151;margin-top:1px}

/* Loading */
.loader{text-align:center;padding:40px;color:#4a5568;font-size:13px}
.spin{display:inline-block;width:20px;height:20px;border:2px solid #1e2a3d;border-top-color:#60a5fa;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-left:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toggle */
.tog-btn{width:100%;background:none;border:none;padding:8px 14px;color:#374151;font-size:11px;cursor:pointer;text-align:center;display:flex;align-items:center;justify-content:center;gap:4px}
.tog-btn:hover{color:#64748b}

/* Search highlight */
.hl{background:rgba(96,165,250,.25);border-radius:2px;padding:0 1px}
</style>
</head>
<body>

<div class="top">
  <div class="logo">📟 POS Track</div>
  <div style="flex:1"></div>
  <span class="status-dot" id="sdot" style="background:#fbbf24"></span>
  <span class="status-txt" id="stxt">جاري التحميل...</span>
</div>

<div class="search-wrap">
  <input class="search-box" id="q" placeholder="🔍 ابحث عن مطعم، رقم جهاز، رقم سيم..." oninput="doSearch()" autocomplete="off">
</div>

<div class="filters">
  <div class="flt on" onclick="setFilter('all',this)">الكل</div>
  <div class="flt" onclick="setFilter('نشط',this)">✅ نشط</div>
  <div class="flt" onclick="setFilter('جديد',this)">🆕 جديد</div>
  <div class="flt" onclick="setFilter('انتظار',this)">⏳ انتظار</div>
</div>

<div class="stats" id="statsBar">
  <div class="stat"><div class="stat-n" id="sAll">-</div><div class="stat-l">إجمالي</div></div>
  <div class="stat"><div class="stat-n" id="sActive" style="color:#22c55e">-</div><div class="stat-l">نشط</div></div>
  <div class="stat"><div class="stat-n" id="sNew" style="color:#60a5fa">-</div><div class="stat-l">جديد</div></div>
  <div class="stat"><div class="stat-n" id="sWait" style="color:#fbbf24">-</div><div class="stat-l">انتظار</div></div>
</div>

<div id="out" class="results">
  <div class="loader"><span class="spin"></span> جاري تحميل البيانات...</div>
</div>

<script>
// ══════════════════════════════════════════
// Config
// ══════════════════════════════════════════
var DASH_ID  = '1TnlxGwD0G6FV654bFCbXmjL4Ek59IGJWkAYYlb_GD7w';
var M2MTP_ID = '1m6AHs66KJ5RbvQUu5vvM0HGmNalMwElS7LBlk8yVEJA';

// ══════════════════════════════════════════
// State
// ══════════════════════════════════════════
var allRecords = [];   // جميع سجلات Dashboard (مدمجة ومرتبة)
var simMap = {};       // ICCID → MSISDN
var curFilter = 'all';
var openCards = {};    // id → bool

// ══════════════════════════════════════════
// gviz reader
// ══════════════════════════════════════════
async function gviz(sheetId, sheetName) {
  var url = 'https://docs.google.com/spreadsheets/d/' + sheetId +
            '/gviz/tq?tqx=out:json' +
            (sheetName ? '&sheet=' + encodeURIComponent(sheetName) : '');
  var r = await fetch(url);
  var t = await r.text();
  var j = JSON.parse(t.replace(/^[^(]+\(/, '').replace(/\);\s*$/, ''));
  var cols = (j.table.cols || []).map(function(c){ return (c.label || c.id || '').trim(); });
  return (j.table.rows || []).map(function(row) {
    var o = {};
    (row.c || []).forEach(function(cell, i) {
      o[cols[i]] = (cell && cell.v != null) ? String(cell.v).trim() : '';
    });
    return o;
  }).filter(function(o) {
    return Object.values(o).some(function(v){ return v && v.length > 0; });
  });
}

// ══════════════════════════════════════════
// Parse date
// ══════════════════════════════════════════
function parseDate(s) {
  if (!s) return new Date(0);
  s = String(s).trim();
  // Arabic date: ٢٧/٤/٢٠٢٦، ١٠:٣٨:١٨ ص
  s = s.replace(/[٠-٩]/g, function(c){ return String.fromCharCode(c.charCodeAt(0) - 1632); });
  s = s.replace(/،/g, ',');
  // Try direct parse
  var d = new Date(s);
  if (!isNaN(d)) return d;
  // DD/M/YYYY, H:MM:SS format
  var m = s.match(/(\d+)\/(\d+)\/(\d+),\s*(\d+):(\d+):(\d+)/);
  if (m) {
    return new Date(+m[3], +m[2]-1, +m[1], +m[4], +m[5], +m[6]);
  }
  return new Date(0);
}

function fmtDate(s) {
  var d = parseDate(s);
  if (d.getTime() === 0) return s || '';
  return d.toLocaleDateString('ar-IQ', {day:'numeric',month:'numeric',year:'numeric'});
}

// ══════════════════════════════════════════
// SIM lookup: ICCID → MSISDN
// ══════════════════════════════════════════
function buildSimMap(rows) {
  rows.forEach(function(row) {
    var keys = Object.keys(row);
    var iccid, msisdn;
    // Sheet1 has ICCID and MSISDN headers
    if (row['ICCID'] && row['MSISDN']) {
      iccid = row['ICCID'];
      msisdn = row['MSISDN'];
    } else if (keys.length >= 2) {
      // الورقة1: two columns, no headers
      iccid = row[keys[0]];
      msisdn = row[keys[1]];
    }
    if (!iccid || !msisdn) return;
    // Clean: remove .0 suffix (gviz reads numbers as floats)
    iccid  = String(iccid).replace(/\.0+$/,'').trim();
    msisdn = String(msisdn).replace(/\.0+$/,'').trim();
    if (iccid.length < 6 || msisdn.length < 6) return;
    // Store multiple variants
    var stripped = iccid.replace(/^0+/, '');
    simMap[iccid]        = msisdn;
    simMap[stripped]     = msisdn;
    simMap['0'+stripped] = msisdn;
    simMap['00'+stripped]= msisdn;
  });
}

function resolveSimNum(raw) {
  if (!raw) return {num: '', orig: ''};
  var clean = String(raw).replace(/\.0+$/,'').trim().replace(/\s/g,'');
  if (!clean || clean.length < 4) return {num: raw, orig: ''};
  // Already MSISDN? Iraqi format: 07xxxxxxxxx (11 digits) or 7xxxxxxxx (≤10) or 9647...
  var isMS = (clean.startsWith('07') && clean.length === 11) ||
             (clean.startsWith('9647') && clean.length >= 12 && clean.length <= 15) ||
             (clean.startsWith('7') && clean.length <= 10);
  if (isMS) return {num: clean, orig: ''};
  // Try lookup
  var stripped = clean.replace(/^0+/, '');
  var found = simMap[clean] || simMap[stripped] ||
              simMap['0'+stripped] || simMap['00'+stripped];
  if (found) return {num: found, orig: clean};
  return {num: clean, orig: ''};
}

// ══════════════════════════════════════════
// Badge HTML
// ══════════════════════════════════════════
function badgeClass(st) {
  if (st === 'نشط')    return 'b-active';
  if (st === 'جديد')   return 'b-new';
  if (st === 'انتظار') return 'b-wait';
  return 'b-wait';
}

// ══════════════════════════════════════════
// Group records by restaurant name
// ══════════════════════════════════════════
function groupByName(records) {
  var groups = {};
  records.forEach(function(r) {
    var nm = (r['اسم المطعم'] || '').trim();
    var addr = (r['العنوان'] || '').trim();
    var key = nm + '|' + addr;
    if (!groups[key]) {
      groups[key] = {name: nm, addr: addr, recs: []};
    }
    groups[key].recs.push(r);
  });
  // Sort recs within each group by date desc
  Object.values(groups).forEach(function(g) {
    g.recs.sort(function(a,b){ return parseDate(b.submittedAt) - parseDate(a.submittedAt); });
  });
  return groups;
}

// ══════════════════════════════════════════
// Normalize text for search
// ══════════════════════════════════════════
function norm(s) {
  return String(s||'')
    .replace(/[أإآا]/g,'ا')
    .replace(/[ةه]/g,'ه')
    .replace(/[يىئ]/g,'ي')
    .toLowerCase().trim();
}

// ══════════════════════════════════════════
// Render
// ══════════════════════════════════════════
var curFilter = 'all';

function setFilter(f, el) {
  curFilter = f;
  document.querySelectorAll('.flt').forEach(function(e){ e.classList.remove('on'); });
  el.classList.add('on');
  doSearch();
}

function doSearch() {
  var q = norm(document.getElementById('q').value);
  render(q);
}

function render(q) {
  var out = document.getElementById('out');
  if (!allRecords.length) return;

  // Group all records by name+address
  var groups = groupByName(allRecords);
  var keys = Object.keys(groups);

  // Filter by status
  if (curFilter !== 'all') {
    keys = keys.filter(function(k) {
      return groups[k].recs.some(function(r){ return r.status === curFilter; });
    });
  }

  // Filter by search query
  if (q) {
    keys = keys.filter(function(k) {
      var g = groups[k];
      var latest = g.recs[0];
      var simR = resolveSimNum(latest['رقم SIM كارت POS'] || '');
      var haystack = [
        g.name, g.addr,
        latest['رقم جهاز POS'] || '',
        simR.num, simR.orig,
        latest['اسم الموظف المسؤول'] || '',
        latest['سبب الزيارة'] || '',
        latest['ملاحظات'] || ''
      ].map(norm).join(' ');
      return haystack.includes(q);
    });
  }

  // Sort: most recent first
  keys.sort(function(a,b) {
    var da = parseDate(groups[a].recs[0].submittedAt);
    var db = parseDate(groups[b].recs[0].submittedAt);
    return db - da;
  });

  // Stats
  var totRecs = allRecords.length;
  var actRecs = allRecords.filter(function(r){ return r.status === 'نشط'; }).length;
  var newRecs = allRecords.filter(function(r){ return r.status === 'جديد'; }).length;
  var waitRecs= allRecords.filter(function(r){ return r.status === 'انتظار'; }).length;
  document.getElementById('sAll').textContent   = totRecs;
  document.getElementById('sActive').textContent = actRecs;
  document.getElementById('sNew').textContent    = newRecs;
  document.getElementById('sWait').textContent   = waitRecs;

  if (!keys.length) {
    out.innerHTML = '<div class="no-results">🔍 لا توجد نتائج</div>';
    return;
  }

  var html = '';
  keys.forEach(function(k) {
    var g = groups[k];
    var latest = g.recs[0];
    var st = latest.status || '';
    var pos = (latest['رقم جهاز POS'] || '').trim();
    var simRaw = (latest['رقم SIM كارت POS'] || '').trim();
    var simR = resolveSimNum(simRaw);
    var tech = (latest['اسم الموظف المسؤول'] || '').trim();
    var date = fmtDate(latest.submittedAt);
    var reason = (latest['سبب الزيارة'] || '').trim();
    var note = (latest['ملاحظات'] || '').trim();
    var id = k.replace(/[^a-z0-9]/gi,'_');
    var isOpen = openCards[k];

    html += '<div class="card" id="card_'+id+'">';
    // Header row
    html += '<div class="card-header" onclick="toggleCard(\''+k+'\')">';
    html += '<div style="flex:1"><div class="card-name">'+esc(g.name)+'</div>';
    if (g.addr) html += '<div class="card-addr">📍 '+esc(g.addr)+'</div>';
    html += '</div>';
    html += '<span class="badge '+badgeClass(st)+'">'+esc(st)+'</span>';
    html += '</div>';

    // Key info chips
    html += '<div class="card-body">';
    if (pos && pos !== '1' && pos !== '2' && pos !== '3' && pos !== '9') {
      html += '<div class="info-chip pos"><span class="ic">🖥️</span>'+esc(pos)+'</div>';
    }
    if (simR.num && simR.num !== '78' && simR.num.length > 4) {
      html += '<div class="info-chip sim"><span class="ic">📶</span>'+esc(simR.num);
      if (simR.orig) html += '<span class="sim-orig">('+esc(simR.orig)+'→MSISDN)</span>';
      html += '</div>';
    }
    if (date) html += '<div class="info-chip date"><span class="ic">📅</span>'+esc(date)+'</div>';
    if (tech) html += '<div class="info-chip tech"><span class="ic">👤</span>'+esc(tech)+'</div>';
    if (reason && reason.length > 1) html += '<div class="info-chip"><span class="ic">🔧</span>'+esc(reason)+'</div>';
    html += '</div>';

    if (note && note.length > 2) {
      html += '<div style="padding:0 14px 10px;font-size:11px;color:#4a5568">📝 '+esc(note)+'</div>';
    }

    // History
    if (g.recs.length > 1) {
      html += '<div class="tog-btn" onclick="toggleCard(\''+k+'\')">';
      html += (isOpen ? '▲' : '▼') + ' '+g.recs.length+' زيارة';
      html += '</div>';
      html += '<div class="card-hist'+(isOpen?' open':'')+'">'; 
      g.recs.forEach(function(rec, idx) {
        if (idx === 0) return; // skip latest (shown above)
        var rSim = resolveSimNum(rec['رقم SIM كارت POS'] || '');
        var rPos = (rec['رقم جهاز POS'] || '').trim();
        html += '<div class="hist-item">';
        html += '<div class="hist-row">';
        html += '<span class="badge '+badgeClass(rec.status)+'">'+esc(rec.status||'')+'</span>';
        html += '<span class="hist-date">'+fmtDate(rec.submittedAt)+'</span>';
        html += '<span class="hist-tech">'+esc(rec['اسم الموظف المسؤول']||'')+'</span>';
        html += '</div>';
        if (rPos && rPos!=='1'&&rPos!=='2'&&rPos!=='3') {
          html += '<div class="hist-row"><span class="info-chip pos" style="font-size:11px">🖥️ '+esc(rPos)+'</span>';
          if (rSim.num && rSim.num.length>4 && rSim.num!=='78') {
            html += '<span class="info-chip sim" style="font-size:11px">📶 '+esc(rSim.num)+'</span>';
          }
          html += '</div>';
        }
        if (rec['سبب الزيارة']) html += '<div class="hist-reason">'+esc(rec['سبب الزيارة'])+'</div>';
        if (rec['ملاحظات'] && rec['ملاحظات'].length>2) html += '<div class="hist-note">📝 '+esc(rec['ملاحظات'])+'</div>';
        html += '</div>';
      });
      html += '</div>';
    }

    html += '</div>';
  });

  out.innerHTML = html;
}

function toggleCard(k) {
  openCards[k] = !openCards[k];
  doSearch();
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ══════════════════════════════════════════
// Load all data
// ══════════════════════════════════════════
async function loadAll() {
  try {
    // Load dashboard (ورقة1 and default sheet) + M2MTP in parallel
    var [dash1, dash2, m2mtp1, m2mtp2] = await Promise.all([
      gviz(DASH_ID).catch(function(){ return []; }),
      gviz(DASH_ID, 'ورقة1').catch(function(){ return []; }),
      gviz(M2MTP_ID, 'Sheet1').catch(function(){ return []; }),
      gviz(M2MTP_ID, 'الورقة1').catch(function(){ return []; })
    ]);

    // Build SIM map from M2MTP
    buildSimMap(m2mtp1.concat(m2mtp2));

    // Merge dashboard records — filter out user/admin rows (no restaurant name or no status)
    var all = dash1.concat(dash2).filter(function(r) {
      var nm = (r['اسم المطعم'] || '').trim();
      var st = (r['status'] || '').trim();
      return nm.length > 1 && (st === 'نشط' || st === 'جديد' || st === 'انتظار');
    });

    // Deduplicate by id
    var seen = {};
    all = all.filter(function(r) {
      var id = r['id'] || (r['اسم المطعم']+'|'+r['submittedAt']);
      if (seen[id]) return false;
      seen[id] = true;
      return true;
    });

    allRecords = all;

    // Update status
    document.getElementById('sdot').style.background = '#22c55e';
    document.getElementById('stxt').textContent = allRecords.length + ' سجل';

    doSearch();
  } catch(e) {
    document.getElementById('sdot').style.background = '#ef4444';
    document.getElementById('stxt').textContent = 'خطأ في التحميل';
    document.getElementById('out').innerHTML = '<div class="no-results">❌ تعذّر تحميل البيانات<br><small style="color:#374151">'+e.message+'</small></div>';
  }
}

loadAll();
</script>
</body>
</html>

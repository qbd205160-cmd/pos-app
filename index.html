<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#07090f">
<title>نظام تتبع أجهزة POS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07090f;color:#e2e8f0;font-family:'Tajawal',sans-serif;direction:rtl}
.hdr{background:#0d1424;border-bottom:1px solid #1e293b;padding:12px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.logo{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);display:flex;align-items:center;justify-content:center;font-size:18px}
.htitle{font-size:15px;font-weight:800;color:#f1f5f9}
.hsub{font-size:10px;color:#475569}
.modes{display:flex;gap:4px;flex-wrap:wrap;margin-right:auto}
.mb{padding:5px 10px;border-radius:7px;font-size:11px;cursor:pointer;border:1px solid #1e293b;background:transparent;color:#475569;font-family:'Tajawal',sans-serif}
.mb.on{background:rgba(59,130,246,.2);border-color:#3b82f6;color:#93c5fd}
.wrap{max-width:820px;margin:0 auto;padding:16px 12px}
.stbar{background:#0d1424;border:1px solid #1e3a5f;border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:11px;color:#475569;display:flex;align-items:center;gap:7px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#fbbf24}
.dot.ok{background:#22c55e;box-shadow:0 0 6px #22c55e}
.dot.err{background:#ef4444}
.dot.ld{background:#fbbf24;animation:pulse 1s infinite}
.sbar{background:#0d1424;border:1px solid #1e3a5f;border-radius:12px;padding:14px;margin-bottom:14px}
.slbl{font-size:11px;color:#475569;margin-bottom:6px}
.srow{display:flex;gap:7px}
.si{flex:1;padding:11px 13px;border-radius:8px;background:#060a12;border:1px solid #1e3a5f;color:#e2e8f0;font-size:15px;outline:none;font-family:'Tajawal',sans-serif;direction:rtl}
.si:focus{border-color:#3b82f6}
.si::placeholder{color:#334155}
.sbtn{padding:11px 18px;border-radius:8px;border:none;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif;background:linear-gradient(135deg,#3b82f6,#1d4ed8)}
.xbtn{padding:11px 13px;border-radius:8px;border:1px solid #1e3a5f;color:#64748b;font-size:13px;cursor:pointer;background:transparent;font-family:'Tajawal',sans-serif}
.card{background:linear-gradient(135deg,#0d1a2e,#0a1520);border:1px solid #1e3a5f;border-radius:13px;padding:16px;margin-bottom:12px}
.cname{font-size:18px;font-weight:900;color:#f0f6fc;margin-bottom:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:6px;margin-bottom:8px}
.f{background:#060a12;border:1px solid #1e293b;border-radius:8px;padding:7px 10px}
.f.b{border-color:rgba(59,130,246,.3);background:rgba(59,130,246,.07)}
.f.g{border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.07)}
.f.o{border-color:rgba(249,115,22,.3);background:rgba(249,115,22,.07)}
.f.r{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.07)}
.f.p{border-color:rgba(139,92,246,.3);background:rgba(139,92,246,.07)}
.fl{font-size:10px;color:#475569;margin-bottom:2px}
.fv{font-size:12px;color:#cbd5e1;word-break:break-all}
.fv.bl{color:#60a5fa;font-weight:700}.fv.gr{color:#4ade80;font-weight:700}.fv.or{color:#fb923c;font-weight:700}.fv.re{color:#f87171;font-weight:700}.fv.pu{color:#c4b5fd;font-weight:700}
.nb{background:#060a12;border:1px solid #1e293b;border-radius:7px;padding:7px 10px;margin-top:5px}
.sec{font-size:11px;font-weight:700;padding:4px 10px;border-radius:7px;margin:10px 0 5px;display:flex;align-items:center;gap:4px}
.sec.bl{color:#60a5fa;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2)}
.sec.pu{color:#c4b5fd;background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2)}
.sec.gr{color:#4ade80;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2)}
.sec.or{color:#fb923c;background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.2)}
.hi{background:#0d1424;border:1px solid #1e293b;border-radius:9px;margin-bottom:5px;padding:8px 11px}
.hr{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.hn{font-size:11px;color:#64748b;margin-top:3px;line-height:1.6}
.bri{background:#0d1424;border:1px solid #1e293b;border-radius:10px;margin-bottom:6px;padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:8px}
.brn{font-size:13px;font-weight:700;color:#e2e8f0;flex:1}
.brm{font-size:10px;color:#475569}
.bdg{padding:2px 8px;border-radius:11px;font-size:10px;font-weight:700}
.sn{background:#0a2a1a;border:1px solid #1a6a3a;color:#4ade80}
.sj{background:#0a1a2a;border:1px solid #1a4a8a;color:#60a5fa}
.sw{background:#2a1a0a;border:1px solid #6a4a1a;color:#fbbf24}
.sx{background:#1a1a2a;border:1px solid #3a3a5a;color:#94a3b8}
.hbtn{width:100%;padding:6px;border-radius:8px;background:transparent;border:1px solid #1e3a5f;color:#475569;font-size:11px;cursor:pointer;font-family:'Tajawal',sans-serif;margin-bottom:5px}
.ebtn{width:100%;padding:8px;border-radius:8px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);color:#4ade80;font-size:11px;cursor:pointer;font-family:'Tajawal',sans-serif;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:5px}
.empty{text-align:center;padding:40px 16px;background:#0d1424;border-radius:12px;border:1px dashed #1e3a5f}
.hint{background:#0d1424;border:1px solid #1e3a5f;border-radius:8px;padding:10px 14px;font-size:11px;color:#475569;line-height:2}
.lbar{margin-top:8px;padding:6px 10px;background:rgba(59,130,246,.07);border-radius:7px;border:1px solid rgba(59,130,246,.2);font-size:11px;color:#60a5fa;display:none;align-items:center;gap:6px}
.lbar.on{display:flex}
.sp{width:10px;height:10px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
/* Reports */
.rpage{display:none}
.rfilters{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.rsel{width:100%;padding:8px;border-radius:8px;background:#060a12;border:1px solid #1e3a5f;color:#e2e8f0;font-size:12px;font-family:'Tajawal',sans-serif}
.rstats{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:7px;margin-bottom:12px}
.rstat{background:#0d1424;border:1px solid #1e293b;border-radius:9px;padding:9px;text-align:center}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@media(max-width:560px){.grid{grid-template-columns:1fr 1fr}.hdr{padding:10px 12px}.wrap{padding:12px 10px}}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">🖨</div>
  <div><div class="htitle">نظام تتبع أجهزة POS</div><div class="hsub">dashboard · TVF · stock · sim55</div></div>
  <div class="modes">
    <button class="mb on" id="br" onclick="setTab('r')">🏪 مطعم</button>
    <button class="mb" id="bd" onclick="setTab('d')">🖥️ جهاز</button>
    <button class="mb" id="bs" onclick="setTab('s')">📶 سيم</button>
    <button class="mb" id="brp" onclick="setTab('rep')">📊 تقارير</button>
  </div>
</div>
<div class="wrap">
  <div class="stbar">
    <div class="dot ld" id="dot"></div>
    <span id="stmsg">جاري تحميل...</span>
    <button onclick="loadAll()" style="margin-right:auto;padding:3px 8px;border-radius:5px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);color:#60a5fa;font-size:10px;cursor:pointer;font-family:'Tajawal',sans-serif">🔄 تحديث</button>
  </div>

  <!-- Search -->
  <div id="searchSection">
    <div class="sbar">
      <div class="slbl" id="slbl">🔍 ابحث — اسم مطعم، جهاز، سيم، ملاحظة...</div>
      <div class="srow">
        <input class="si" id="si" placeholder="فولكينو | VS | VB53221 | 7873890..." onkeydown="if(event.key==='Enter')go()">
        <button class="sbtn" id="sbtn" onclick="go()">🔍 بحث</button>
        <button class="xbtn" onclick="document.getElementById('si').value=''">✕</button>
      </div>
      <div class="lbar" id="lb"><span class="sp"></span><span id="lmsg">جاري...</span></div>
    </div>
    <div id="res">
      <div class="hint">
        <strong style="color:#60a5fa">أمثلة:</strong><br>
        🏪 اسم مطعم: <span style="color:#e2e8f0">فولكينو</span> أو <span style="color:#e2e8f0">هاديز</span><br>
        🖥️ كل VS: <span style="color:#e2e8f0">VS</span> | كل VB: <span style="color:#e2e8f0">VB</span> | كل VE: <span style="color:#e2e8f0">VE</span><br>
        📶 سيم: <span style="color:#e2e8f0">7873890544</span>
      </div>
    </div>
  </div>

  <!-- Reports -->
  <div id="repSection" class="rpage">
    <div class="sbar">
      <div style="font-size:13px;font-weight:700;color:#60a5fa;margin-bottom:10px">📊 تقارير المطاعم</div>
      <div class="rfilters">
        <div><div class="slbl">📊 الحالة</div><select id="rSt" class="rsel"><option value="">الكل</option><option>نشط</option><option>جديد</option><option>انتظار</option><option>مكتمل</option></select></div>
        <div><div class="slbl">👤 الفني</div><select id="rTe" class="rsel"><option value="">الكل</option></select></div>
        <div><div class="slbl">📅 من</div><input type="date" id="rFr" class="rsel"></div>
        <div><div class="slbl">📅 إلى</div><input type="date" id="rTo" class="rsel"></div>
      </div>
      <input id="rSrch" placeholder="🔍 بحث في النتائج..." class="si" style="margin-bottom:10px;width:100%" oninput="doRep()">
      <div style="display:flex;gap:7px">
        <button onclick="doRep()" style="flex:1;padding:8px;border-radius:8px;background:#3b82f6;border:none;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif">🔍 تطبيق</button>
        <button onclick="resetRep()" style="padding:8px 12px;border-radius:8px;background:transparent;border:1px solid #1e3a5f;color:#475569;font-size:12px;cursor:pointer;font-family:'Tajawal',sans-serif">↺</button>
        <button onclick="expRep()" style="padding:8px 12px;border-radius:8px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#4ade80;font-size:12px;cursor:pointer;font-family:'Tajawal',sans-serif">📥 CSV</button>
      </div>
    </div>
    <div id="rstats" class="rstats"></div>
    <div id="rres"></div>
  </div>
</div>

<script>
var DASH='1TnlxGwD0G6FV654bFCbXmjL4Ek59IGJWkAYYlb_GD7w';
var TVF='11iL-WTrWcw9hSn5YD6i1LvLnczMrFu0HInjXmBUCFmo';
var STOCK='1ZOB4rHFil99StMeaCPm59lDT4vnLkaksY2d-ZszC-t0';
var SIM55='1Fwyln1_-ogHjvfnoQnI2tdXTWGRosThZofgjWU2TSl8';
var FILE='1m6AHs66KJ5RbvQUu5vvM0HGmNalMwElS7LBlk8yVEJA';
var TVF4='Form Responses 4';

var D={dash:[],tvf:[],tvf4:[],stock:[],sim:[],file:[]};
var IMAP={};
var loaded=false;
var tab='r';
var _br,_lastQ;
var _repData=[];

// ── GViz ──────────────────────────────────────────────────────
async function gviz(id,sheet){
  var url='https://docs.google.com/spreadsheets/d/'+id+'/gviz/tq?tqx=out:json'+(sheet?'&sheet='+encodeURIComponent(sheet):'');
  var r=await fetch(url);
  var t=await r.text();
  var j=JSON.parse(t.replace(/^[^(]+\(/,'').replace(/\);?\s*$/,''));
  var cols=j.table.cols.map(function(c){return(c.label||c.id||'').trim();});
  return(j.table.rows||[]).map(function(row){
    var o={};
    (row.c||[]).forEach(function(cell,i){
      o[cols[i]]=cell&&cell.v!=null?String(cell.v).trim():'';
    });
    return o;
  }).filter(function(o){return Object.values(o).some(function(v){return v;});});
}

// ── Load ──────────────────────────────────────────────────────
async function loadAll(){
  setSt('ld','جاري تحميل...');
  D={dash:[],tvf:[],tvf4:[],stock:[],sim:[],file:[]};
  loaded=false;
  try{
    // كل الشيتات بالتوازي في وقت واحد
    var results=await Promise.all([
      gviz(DASH).catch(function(){return [];}),
      gviz(DASH,'ورقة1').catch(function(){return [];}),
      gviz(STOCK).catch(function(){return [];}),
      gviz(SIM55).catch(function(){return [];}),
      gviz(TVF).catch(function(){return [];}),
      gviz(TVF,TVF4).catch(function(){return [];}),
      gviz(FILE).catch(function(){return [];})
    ]);
    D.dash=results[0].concat(results[1]);
    D.stock=results[2];
    D.sim=results[3];
    D.tvf=results[4];
    D.tvf4=results[5];
    D.file=results[6];
    buildICCID();
    loaded=true;
    setSt('ok','✅ جاهز — '+D.dash.length+' dashboard · '+(D.tvf.length+D.tvf4.length)+' TVF · '+D.stock.length+' stock · '+D.sim.length+' sim55');
  }catch(e){setSt('err','فشل: '+e.message);}
}

function setSt(s,m){
  var d=document.getElementById('dot');
  d.className='dot '+(s==='ok'?'ok':s==='err'?'err':'ld');
  document.getElementById('stmsg').textContent=m;
}

function buildICCID(){
  IMAP={};
  D.file.forEach(function(r){
    var ic=cv(r,'ICCID');var ms=cv(r,'MSISDN');
    if(ic&&ms){
      ic=ic.replace(/\D/g,'');ms=ms.replace(/\D/g,'');
      IMAP[ic]=ms;
      if(ic.length>9)IMAP[ic.slice(-9)]=ms;
    }
  });
}

function toMS(v){
  if(!v)return v;
  var c=String(v).replace(/\D/g,'');
  if(c.length>12&&IMAP[c])return IMAP[c];
  if(c.length>9&&IMAP[c.slice(-9)])return IMAP[c.slice(-9)];
  return v;
}

// ── Helpers ───────────────────────────────────────────────────
function cv(r){
  for(var i=1;i<arguments.length;i++){
    var k=arguments[i];
    if(r&&r[k]!==undefined&&r[k]!=='')return r[k];
  }
  return '';
}

function nd(s){return(s||'').toLowerCase().replace(/[\s\-]/g,'');}

function ns(s){
  return(s||'').replace(/\D/g,'').replace(/^00964/,'').replace(/^964/,'').replace(/^0/,'').slice(-9);
}

function pd(s){
  if(!s)return new Date(0);
  s=String(s).replace(/[٠-٩]/g,function(d){return'٠١٢٣٤٥٦٧٨٩'.indexOf(d);}).trim();
  var m=s.match(/(\d+)\/(\d+)\/(\d+)/);
  if(!m)return new Date(0);
  var y=parseInt(m[3]),mo=parseInt(m[2]),d=parseInt(m[1]);
  if(y<100){var tmp=y;y=d;d=tmp;}
  var t=s.match(/(\d+):(\d+)/);
  var h=t?parseInt(t[1]):0,mn=t?parseInt(t[2]):0;
  if(s.includes('م')&&h<12)h+=12;
  return new Date(y,mo-1,d,h,mn);
}

function bdg(s){
  var m={'نشط':'sn','Active':'sn','active':'sn','live':'sn','جديد':'sj','انتظار':'sw'};
  return m[s]||'sx';
}

function fdev(r){
  var v='';
  Object.values(r).forEach(function(x){
    x=(x||'').trim();
    if(!v&&x.length>4&&/^v[bse]/i.test(x))v=x;
  });
  return v;
}

function score(name,q){
  name=(name||'').toLowerCase().trim();q=(q||'').toLowerCase().trim();
  if(!name||!q)return 0;
  if(name===q)return 1;
  if(name.includes(q))return 0.95;
  if(q.includes(name))return 0.85;
  var w=q.split(/\s+/);
  var mc=w.filter(function(x){return name.includes(x);}).length;
  if(mc===0){var s=0;for(var i=3;i<=q.length;i++){if(name.includes(q.slice(0,i)))s=i;}return s>=3?0.4*(s/q.length):0;}
  if(w.length===1)return 0.8;
  return 0.6*(mc/w.length);
}

// ── Tab control ───────────────────────────────────────────────
function setTab(t){
  tab=t;
  ['br','bd','bs','brp'].forEach(function(x){document.getElementById(x).classList.remove('on');});
  document.getElementById(t==='rep'?'brp':'b'+t).classList.add('on');
  document.getElementById('searchSection').style.display=t==='rep'?'none':'block';
  document.getElementById('repSection').style.display=t==='rep'?'block':'none';
  if(t==='rep'){buildRepFilters();doRep();}
}

// ── Search ────────────────────────────────────────────────────
function go(){
  var q=(document.getElementById('si').value||'').trim();
  if(!q)return;
  if(!loaded){alert('البيانات لم تُحمَّل بعد، انتظر قليلاً');return;}
  showLd(true);
  setTimeout(function(){
    var ql=q.toLowerCase();
    if(/^v[bse]$/i.test(ql))byPrefix(ql);
    else if(/^v[bse]/i.test(ql)&&ql.length>4)byDev(q);
    else if(/^[0-9]{7,}$/.test(q.replace(/\D/g,''))&&q.replace(/\D/g,'').length>=9)bySim(q);
    else byName(q);
    showLd(false);
  },10);
}

// By prefix
function byPrefix(p){
  var seen={};var matched=[];
  [D.dash,D.tvf,D.tvf4,D.stock].forEach(function(arr,ai){
    arr.forEach(function(r){
      var cols=['رقم جهاز POS','رقم الجهاز','POS number','vs','VS'];
      var dev='';
      cols.forEach(function(c){if(!dev&&r[c]&&r[c].toLowerCase().startsWith(p))dev=r[c];});
      if(!dev)dev=fdev(r);
      if(dev&&dev.toLowerCase().startsWith(p)&&!seen[dev.toUpperCase()]){
        seen[dev.toUpperCase()]=true;
        var name=cv(r,'اسم المطعم','rest name','REST NAME','اسم الوظف');
        var sim=toMS(cv(r,'رقم SIM كارت POS','رقم السم كارت','SIM number','MSISDN','msid'));
        var date=cv(r,'submittedAt','Timestamp','كرل دايت');
        var st=cv(r,'status');
        matched.push({dev:dev,name:name,sim:sim,date:date,status:st,row:r});
      }
    });
  });
  if(!matched.length){noRes(p);return;}
  matched.sort(function(a,b){return pd(b.date)-pd(a.date);});
  _br=matched;_lastQ=p;
  var h='<div class="sec bl">🖥️ أجهزة '+p.toUpperCase()+' — '+matched.length+' جهاز</div>';
  h+='<button class="ebtn" onclick="expPrefix()">📥 تصدير CSV</button>';
  matched.forEach(function(m,i){
    h+='<div class="bri" onclick="openPfx('+i+')"><div style="flex:1"><div class="brn">🖥️ '+m.dev+'</div><div style="display:flex;gap:7px;flex-wrap:wrap;margin-top:3px">'
    +(m.name?'<span class="brm">🏪 '+m.name+'</span>':'')
    +(m.sim&&m.sim.length>5?'<span class="brm">📶 '+m.sim+'</span>':'')
    +(m.date?'<span class="brm">📅 '+m.date+'</span>':'')
    +(m.status?'<span class="bdg '+bdg(m.status)+'">'+m.status+'</span>':'')
    +'</div></div><span style="color:#3b82f6">◀</span></div>';
  });
  document.getElementById('res').innerHTML=h;
}

function openPfx(i){
  var m=_br[i];if(!m)return;
  byDev(m.dev);
  window._fromPfx=true;
}

// By device
function byDev(q){
  var ql=nd(q);
  var dash=D.dash.filter(function(r){return nd(cv(r,'رقم جهاز POS')).includes(ql);}).sort(function(a,b){return pd(cv(b,'submittedAt'))-pd(cv(a,'submittedAt'));});
  var tvf=D.tvf.concat(D.tvf4).filter(function(r){
    return Object.values(r).some(function(v){return v&&/^v[bse]/i.test(v.trim())&&nd(v).includes(ql);});
  }).sort(function(a,b){return pd(cv(b,'Timestamp','كرل دايت'))-pd(cv(a,'Timestamp','كرل دايت'));});
  var stk=D.stock.filter(function(r){var v=fdev(r)||cv(r,'vs','VS');return v&&nd(v).includes(ql);});
  if(!dash.length&&!tvf.length&&!stk.length){noRes(q);return;}
  var name=dash.length?cv(dash[0],'اسم المطعم'):tvf.length?cv(tvf[0],'اسم المطعم'):q;
  var sim=dash.length?toMS(cv(dash[0],'رقم SIM كارت POS')):tvf.length?toMS(cv(tvf[0],'رقم السم كارت','SIM number')):'';
  var si5=sim?D.sim.filter(function(r){return ns(cv(r,'ارقام'))===ns(sim);}):[];
  renderMain({name:name,dev:q,sim:sim,dash:dash,tvf:tvf,stk:stk.length?stk[0]:null,si5:si5.length?si5[0]:null},true);
}

// By sim
function bySim(q){
  var c=q.replace(/\D/g,'');
  // ICCID?
  if(c.length>12){var ms=IMAP[c]||IMAP[c.slice(-9)];if(ms){document.getElementById('si').value=ms;bySim(ms);return;}}
  var nq=ns(q);
  var dash=D.dash.filter(function(r){return ns(cv(r,'رقم SIM كارت POS'))===nq;}).sort(function(a,b){return pd(cv(b,'submittedAt'))-pd(cv(a,'submittedAt'));});
  var tvf=D.tvf.concat(D.tvf4).filter(function(r){return ns(cv(r,'رقم السم كارت','SIM number'))===nq;});
  var si5=D.sim.filter(function(r){return ns(cv(r,'ارقام'))===nq;});
  if(!dash.length&&!tvf.length&&!si5.length){noRes(q);return;}
  var name=dash.length?cv(dash[0],'اسم المطعم'):tvf.length?cv(tvf[0],'اسم المطعم'):si5.length?cv(si5[0],'اسم المطعم'):q;
  renderMain({name:name,dev:dash.length?cv(dash[0],'رقم جهاز POS'):'',sim:q,dash:dash,tvf:tvf,stk:null,si5:si5.length?si5[0]:null},true);
}

// By name
function byName(q){
  var byN={};
  D.dash.forEach(function(r){var n=cv(r,'اسم المطعم');var s=score(n,q);if(s>0.3){if(!byN[n])byN[n]={name:n,sc:s,dash:[],tvf:[],stk:[],si:[]};byN[n].dash.push(r);if(s>byN[n].sc)byN[n].sc=s;}});
  D.tvf4.forEach(function(r){var n=cv(r,'اسم المطعم');var s=score(n,q);if(s>0.3){if(!byN[n])byN[n]={name:n,sc:s,dash:[],tvf:[],stk:[],si:[]};byN[n].tvf.push(r);if(s>byN[n].sc)byN[n].sc=s;}});
  D.sim.forEach(function(r){var n=cv(r,'اسم المطعم');var s=score(n,q);if(s>0.3){if(!byN[n])byN[n]={name:n,sc:s,dash:[],tvf:[],stk:[],si:[]};byN[n].si.push(r);}});
  if(!Object.keys(byN).length){noRes(q);return;}
  var list=Object.values(byN).sort(function(a,b){return b.sc-a.sc;});
  var best=list[0].sc;
  list=list.filter(function(x){return x.sc>=best*0.75;});
  // Add TVF5 and stock via device
  list.forEach(function(br){
    br.dash.sort(function(a,b){return pd(cv(b,'submittedAt'))-pd(cv(a,'submittedAt'));});
    var devs={},sims={};
    br.dash.forEach(function(r){var d=nd(cv(r,'رقم جهاز POS'));if(d.length>4)devs[d]=true;var s=ns(cv(r,'رقم SIM كارت POS'));if(s.length>6)sims[s]=true;});
    br.tvf=br.tvf.concat(D.tvf.filter(function(r){var d=nd(fdev(r)||cv(r,'رقم الجهاز'));return devs[d];})).sort(function(a,b){return pd(cv(b,'Timestamp'))-pd(cv(a,'Timestamp'));});
    D.stock.forEach(function(r){var d=nd(fdev(r)||cv(r,'vs','VS'));if(devs[d])br.stk.push(r);});
    D.sim.forEach(function(r){var s=ns(cv(r,'ارقام'));if(sims[s])br.si.push(r);});
  });
  _br=list;_lastQ=q;
  if(list.length===1){renderMain({name:list[0].name,dev:'',sim:'',dash:list[0].dash,tvf:list[0].tvf,stk:list[0].stk.length?list[0].stk[0]:null,si5:list[0].si.length?list[0].si[0]:null},false);return;}
  var h='';
  h+=renderMainCard(list[0]);
  if(list.length>1){
    h+='<div style="font-size:11px;color:#475569;margin:12px 0 6px;padding:6px 10px;background:#0d1424;border-radius:7px;border:1px solid #1e293b">🏪 فروع أخرى ('+( list.length-1)+')</div>';
    list.slice(1).forEach(function(br,i){
      var ld=br.dash.length?cv(br.dash[0],'submittedAt'):'';
      var st=br.dash.length?cv(br.dash[0],'status'):'';
      h+='<div class="bri" onclick="openBr('+i+')"><div style="flex:1"><div class="brn">'+br.name+'</div><div style="display:flex;gap:7px;flex-wrap:wrap;margin-top:3px">'+(ld?'<span class="brm">📅 '+ld+'</span>':'')+(st?'<span class="bdg '+bdg(st)+'">'+st+'</span>':'')+'</div></div><span style="color:#3b82f6">◀</span></div>';
    });
  }
  h+='<button class="ebtn" onclick="expName()">📥 تصدير CSV</button>';
  document.getElementById('res').innerHTML=h;
}

function openBr(i){
  var br=_br[i+1];if(!br)return;
  var h='<button onclick="restoreBr()" style="width:100%;padding:8px;border-radius:8px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);color:#60a5fa;font-size:12px;cursor:pointer;font-family:inherit;margin-bottom:10px;display:flex;align-items:center;gap:5px;justify-content:center">◀ رجوع</button>';
  h+=renderMainCard(br);
  document.getElementById('res').innerHTML=h;
}
function restoreBr(){if(_br)byName(_lastQ);}

function sf(ico,lbl,val,cls,vc){
  if(!val||['1','2','3','—','//'].indexOf((val||'').trim())>=0||(val||'').trim().length<=1)return'';
  return'<div class="f '+( cls||'')+'"><div class="fl">'+ico+' '+lbl+'</div><div class="fv '+(vc||'')+'">'+val+'</div></div>';
}

function renderMain(data,addBack){

function buildRepFilters(){

  D.dash.forEach(function(r){var t=cv(r,'اسم الموظف المسؤول');if(t&&t.length>1)techs.add(t);});
  var sel=document.getElementById('rTe');

function doRep(){
  if(!loaded)return;
  var st=document.getElementById('rSt').value;
  var te=document.getElementById('rTe').value;
  var fr=document.getElementById('rFr').value;
  var to=document.getElementById('rTo').value;
  var srch=(document.getElementById('rSrch').value||'').toLowerCase();
  var byN={};
  D.dash.forEach(function(r){
    var n=cv(r,'اسم المطعم');if(!n)return;
    if(!byN[n]||pd(cv(r,'submittedAt'))>pd(cv(byN[n],'submittedAt')))byN[n]=r;
  });
  var rows=Object.values(byN).filter(function(r){
    if(st&&cv(r,'status')!==st)return false;
    if(te&&cv(r,'اسم الموظف المسؤول')!==te)return false;
    if(fr&&pd(cv(r,'submittedAt'))<new Date(fr))return false;
    if(to&&pd(cv(r,'submittedAt'))>new Date(to+'T23:59:59'))return false;
    if(srch&&!Object.values(r).join(' ').toLowerCase().includes(srch))return false;
    return true;
  }).sort(function(a,b){return pd(cv(b,'submittedAt'))-pd(cv(a,'submittedAt'));});
  _repData=rows;
  // Stats
  var s={total:rows.length,active:0,wait:0,new_:0,done:0};
  rows.forEach(function(r){var v=cv(r,'status');if(v==='نشط')s.active++;else if(v==='انتظار')s.wait++;else if(v==='جديد')s.new_++;else if(v==='مكتمل')s.done++;});
  document.getElementById('rstats').innerHTML=
    '<div class="rstat"><div style="font-size:20px">📊</div><div style="font-size:20px;font-weight:900;color:#60a5fa">'+s.total+'</div><div style="font-size:10px;color:#475569">إجمالي</div></div>'+
    '<div class="rstat"><div style="font-size:20px">✅</div><div style="font-size:20px;font-weight:900;color:#4ade80">'+s.active+'</div><div style="font-size:10px;color:#475569">نشط</div></div>'+
    '<div class="rstat"><div style="font-size:20px">⏳</div><div style="font-size:20px;font-weight:900;color:#fbbf24">'+s.wait+'</div><div style="font-size:10px;color:#475569">انتظار</div></div>'+
    '<div class="rstat"><div style="font-size:20px">🆕</div><div style="font-size:20px;font-weight:900;color:#93c5fd">'+s.new_+'</div><div style="font-size:10px;color:#475569">جديد</div></div>';
  // Results
  if(!rows.length){document.getElementById('rres').innerHTML='<div class="empty">لا نتائج</div>';return;}
  var h='<div style="font-size:11px;color:#475569;margin-bottom:8px">'+rows.length+' مطعم</div>';
  rows.forEach(function(r,i){
    var st2=cv(r,'status');var dev=cv(r,'رقم جهاز POS');var sim=toMS(cv(r,'رقم SIM كارت POS'));
    h+='<div class="hi" style="cursor:pointer;margin-bottom:6px" onclick="this.querySelector(\'.rdet\').style.display=this.querySelector(\'.rdet\').style.display===\'none\'?\'block\':\'none\'">'
    +'<div class="hr"><span style="font-size:11px;color:#334155;min-width:22px">'+(i+1)+'</span><span style="font-size:13px;font-weight:700;color:#e2e8f0;flex:1">'+cv(r,'اسم المطعم')+'</span>'+(dev&&dev.length>3&&['1','2','3'].indexOf(dev)<0?'<span style="font-size:10px;color:#60a5fa">🖥️ '+dev+'</span>':'')+'<span class="bdg '+bdg(st2)+'">'+st2+'</span></div>'
    +'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:3px">'
    +(cv(r,'العنوان')?'<span class="brm">📍 '+cv(r,'العنوان')+'</span>':'')
    +(cv(r,'submittedAt')?'<span class="brm">📅 '+cv(r,'submittedAt')+'</span>':'')
    +(cv(r,'اسم الموظف المسؤول')?'<span class="brm">👤 '+cv(r,'اسم الموظف المسؤول')+'</span>':'')
    +'</div>'
    +'<div class="rdet" style="display:none;margin-top:8px;padding-top:7px;border-top:1px solid #1e293b;font-size:11px;display:grid;grid-template-columns:1fr 1fr;gap:5px">'
    +(sim&&sim.length>5?'<div><span style="color:#475569">📶 </span><span style="color:#fb923c">'+sim+'</span></div>':'')
    +(cv(r,'حالة SIM')?'<div><span style="color:#475569">📡 </span><span style="color:'+(cv(r,'حالة SIM')==='4G'?'#4ade80':'#f87171')+'">'+cv(r,'حالة SIM')+'</span></div>':'')
    +(cv(r,'منافس')&&cv(r,'منافس')!=='—'?'<div style="grid-column:1/-1"><span style="color:#475569">📱 </span><span style="color:#c4b5fd">'+cv(r,'منافس')+'</span></div>':'')
    +(cv(r,'ملاحظات')&&cv(r,'ملاحظات')!=='—'?'<div style="grid-column:1/-1"><span style="color:#475569">📝 </span><span style="color:#94a3b8">'+cv(r,'ملاحظات')+'</span></div>':'')
    +'</div></div>';
  });
  document.getElementById('rres').innerHTML=h;
}

function resetRep(){['rSt','rTe'].forEach(function(x){document.getElementById(x).value='';});document.getElementById('rFr').value='';document.getElementById('rTo').value='';document.getElementById('rSrch').value='';doRep();}

// ── Export ────────────────────────────────────────────────────
function dlCSV(rows,name){
  var csv='\uFEFF'+rows.map(function(r){return r.map(function(c){return'"'+(c||'').replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));a.download=name;a.click();
}
function expPrefix(){
  if(!_br)return;
  var rows=[['رقم الجهاز','اسم المطعم','رقم السيم','التاريخ','الحالة']];
  _br.forEach(function(m){rows.push([m.dev,m.name||'',m.sim||'',m.date||'',m.status||'']);});
  dlCSV(rows,'devices_'+(_lastQ||'export')+'.csv');
}
function expName(){
  if(!_br)return;
  var rows=[['اسم المطعم','رقم الجهاز','رقم السيم','التاريخ','الحالة','الفني']];
  _br.forEach(function(br){var t=br.dash.length?br.dash[0]:null;rows.push([br.name,t?cv(t,'رقم جهاز POS'):'',t?toMS(cv(t,'رقم SIM كارت POS')):'',t?cv(t,'submittedAt'):'',t?cv(t,'status'):'',t?cv(t,'اسم الموظف المسؤول'):'']);});
  dlCSV(rows,'restaurants_'+(_lastQ||'export')+'.csv');
}
function expSingle(){
  if(!window._curData)return;
  var d=window._curData;var t=d.dash.length?d.dash[0]:null;
  dlCSV([['اسم المطعم','رقم الجهاز','رقم السيم','التاريخ','الحالة','الفني','العنوان','ملاحظات'],[d.name,d.dev||'',d.sim||'',t?cv(t,'submittedAt'):'',t?cv(t,'status'):'',t?cv(t,'اسم الموظف المسؤول'):'',t?cv(t,'العنوان'):'',t?cv(t,'ملاحظات'):'']],('device_'+d.dev+'.csv'));
}
function expRep(){
  var rows=[['اسم المطعم','رقم الجهاز','رقم السيم','العنوان','الحالة','الفني','آخر تاسك','المنافسين','ملاحظات']];
  _repData.forEach(function(r){rows.push([cv(r,'اسم المطعم'),cv(r,'رقم جهاز POS'),toMS(cv(r,'رقم SIM كارت POS')),cv(r,'العنوان'),cv(r,'status'),cv(r,'اسم الموظف المسؤول'),cv(r,'submittedAt'),cv(r,'منافس'),cv(r,'ملاحظات')]);});
  dlCSV(rows,'تقرير_المطاعم.csv');
}

// ── Utils ─────────────────────────────────────────────────────
function tgl(btn,id){var l=document.getElementById(id);if(!l)return;if(l.style.display==='none'){l.style.display='block';btn.textContent=btn.textContent.replace('▼','▲');}else{l.style.display='none';btn.textContent=btn.textContent.replace('▲','▼');}}
function noRes(q){document.getElementById('res').innerHTML='<div class="empty"><div style="font-size:36px;margin-bottom:8px">🔍</div><div style="color:#475569;font-size:13px">لا نتائج لـ "<span style="color:#60a5fa">'+q+'</span>"</div></div>';}
function showLd(v){document.getElementById('lb').className='lbar'+(v?' on':'');document.getElementById('sbtn').disabled=v;document.getElementById('sbtn').textContent=v?'...':'🔍 بحث';}

loadAll();

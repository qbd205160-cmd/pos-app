<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>تتبع أجهزة POS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh;direction:rtl;font-size:14px}

/* Top Bar */
.top{background:#161b27;border-bottom:1px solid #1e2a3d;padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200;flex-wrap:wrap}
.logo{font-size:15px;font-weight:800;color:#60a5fa;white-space:nowrap}
.top-tabs{display:flex;gap:4px;flex:1;justify-content:center;flex-wrap:wrap}
.tab{padding:5px 14px;border-radius:20px;font-size:12px;cursor:pointer;color:#64748b;transition:all .2s;background:none;border:none;font-family:inherit}
.tab.on{background:#1d4ed8;color:#fff}
.st-dot{width:8px;height:8px;border-radius:50%;background:#fbbf24;flex-shrink:0}
.st-txt{font-size:11px;color:#64748b;white-space:nowrap}

/* Search bar */
.srch-wrap{padding:12px 16px;background:#0f1117;position:sticky;top:49px;z-index:100}
.srch-box{display:flex;gap:8px;align-items:center;background:#161b27;border:1px solid #1e2a3d;border-radius:10px;padding:8px 12px}
.srch-box input{flex:1;background:none;border:none;outline:none;color:#e2e8f0;font-size:14px;font-family:inherit;direction:rtl;min-width:0}
.srch-box input::placeholder{color:#334155}
.srch-btn{padding:6px 16px;background:#1d4ed8;border:none;border-radius:7px;color:#fff;cursor:pointer;font-size:13px;font-family:inherit;white-space:nowrap}

/* Filter pills */
.filters{display:flex;gap:6px;padding:0 16px 12px;flex-wrap:wrap}
.ftr{padding:4px 12px;border-radius:20px;font-size:11px;cursor:pointer;background:#161b27;border:1px solid #1e2a3d;color:#64748b;transition:all .15s;white-space:nowrap}
.ftr.on{border-color:#3b82f6;color:#93c5fd;background:rgba(59,130,246,.12)}

/* Stats bar */
.stats{display:flex;gap:1px;padding:0 16px 12px;flex-wrap:wrap}
.stat{flex:1;min-width:80px;background:#161b27;border:1px solid #1e2a3d;border-radius:8px;padding:8px 10px;text-align:center;margin:2px}
.stat-n{font-size:18px;font-weight:800;color:#60a5fa}
.stat-l{font-size:10px;color:#475569;margin-top:2px}

/* Cards */
#out{padding:0 16px 24px}
.rest-card{background:#161b27;border:1px solid #1e2a3d;border-radius:12px;margin-bottom:10px;overflow:hidden}
.rc-head{padding:12px 14px;display:flex;align-items:flex-start;gap:10px;cursor:pointer}
.rc-head:hover{background:rgba(59,130,246,.06)}
.rc-name{font-size:14px;font-weight:700;color:#f1f5f9;flex:1}
.rc-meta{font-size:11px;color:#475569;margin-top:3px;line-height:1.6}
.rc-badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.bdg{padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600}
.bdg-active{background:#052e16;border:1px solid #166534;color:#4ade80}
.bdg-new{background:#172554;border:1px solid #1e40af;color:#93c5fd}
.bdg-wait{background:#1c1002;border:1px solid #713f12;color:#fbbf24}
.bdg-4g{background:#064e3b;border:1px solid #065f46;color:#6ee7b7}
.bdg-off{background:#1c0202;border:1px solid #7f1d1d;color:#f87171}
.bdg-dev{background:#1e1b4b;border:1px solid #3730a3;color:#a5b4fc}
.rc-arrow{font-size:12px;color:#334155;margin-top:2px;flex-shrink:0}

/* Task detail */
.rc-detail{display:none;border-top:1px solid #1e2a3d}
.rc-detail.open{display:block}
.task-item{padding:10px 14px;border-bottom:1px solid #111827;background:#0f1117}
.task-item:last-child{border-bottom:none}
.task-latest{background:#0d1a2e!important;border-right:3px solid #3b82f6}
.task-hdr{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.task-date{font-size:11px;color:#60a5fa;font-weight:600}
.task-tech{font-size:11px;color:#94a3b8}
.task-reason{font-size:11px;color:#fbbf24}
.task-status{padding:1px 7px;border-radius:8px;font-size:10px}
.task-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}
.task-field{background:#161b27;border-radius:6px;padding:6px 8px}
.tf-lbl{font-size:9px;color:#475569;margin-bottom:2px}
.tf-val{font-size:11px;color:#cbd5e1;word-break:break-all}
.tf-val.hi{color:#60a5fa;font-weight:700}
.tf-val.sim{color:#fb923c}
.tf-val.grn{color:#4ade80}
.tf-val.red{color:#f87171}
.task-notes{margin-top:6px;padding:7px 9px;background:#0a0f1a;border-radius:6px;font-size:11px;color:#94a3b8;line-height:1.6}
.task-full{grid-column:1/-1}
.tvf-section{padding:8px 14px;background:#0a0a14;border-top:1px solid #1e1e3a}
.tvf-hdr{font-size:10px;color:#8b5cf6;margin-bottom:6px;font-weight:600}
.tvf-item{padding:6px 8px;background:#12122a;border-radius:6px;margin-bottom:4px;font-size:11px;color:#a78bfa;border:1px solid #1e1e3a}

/* Empty */
.empty{text-align:center;padding:60px 20px;color:#334155;font-size:14px}

/* Report tab */
#tab-report{padding:16px}
.rep-section{margin-bottom:20px}
.rep-section h3{font-size:12px;color:#64748b;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #1e2a3d}

/* Report filters */
.rep-filters{background:#161b27;border:1px solid #1e2a3d;border-radius:10px;padding:14px;margin-bottom:16px}
.rep-filters h3{font-size:12px;color:#94a3b8;margin-bottom:12px}
.rep-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.rep-label{font-size:11px;color:#64748b;min-width:60px}
.rep-select{flex:1;min-width:120px;padding:6px 10px;background:#0f1117;border:1px solid #1e2a3d;border-radius:6px;color:#e2e8f0;font-size:12px;font-family:inherit}
.rep-input{flex:1;min-width:100px;padding:6px 10px;background:#0f1117;border:1px solid #1e2a3d;border-radius:6px;color:#e2e8f0;font-size:12px;font-family:inherit}
.rep-btn{padding:7px 18px;background:#1d4ed8;border:none;border-radius:7px;color:#fff;cursor:pointer;font-size:12px;font-family:inherit}
.rep-card{background:#161b27;border:1px solid #1e2a3d;border-radius:8px;padding:12px;margin-bottom:8px}
.rep-name{font-size:13px;font-weight:700;color:#e2e8f0;margin-bottom:8px}
.rep-stat-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid #111827}
.rep-stat-row:last-child{border-bottom:none}
.rep-val{font-weight:700;color:#60a5fa}
.task-row{background:#0f1117;border-radius:6px;padding:8px 10px;margin-bottom:5px;font-size:11px;border:1px solid #1e2a3d}
.task-row-hdr{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.export-btn{padding:6px 14px;background:#059669;border:none;border-radius:7px;color:#fff;cursor:pointer;font-size:11px;font-family:inherit;margin-top:10px}

/* Loading */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.loading-spin{display:inline-block;width:10px;height:10px;border:2px solid rgba(255,255,255,.2);border-top-color:#60a5fa;border-radius:50%;animation:spin .7s linear infinite}
</style>
</head>
<body>

<div class="top">
  <div class="logo">🖨 POS</div>
  <div class="top-tabs">
    <button class="tab on" onclick="switchTab('search',this)">🔍 بحث</button>
    <button class="tab" onclick="switchTab('report',this)">📊 تقارير</button>
  </div>
  <div style="display:flex;align-items:center;gap:6px">
    <div class="st-dot" id="dot" style="animation:pulse 1.5s infinite"></div>
    <span class="st-txt" id="stxt">جاري التحميل...</span>
  </div>
</div>

<!-- SEARCH TAB -->
<div id="tab-search">
  <div class="srch-wrap">
    <div class="srch-box">
      <span style="font-size:16px">🔍</span>
      <input id="si" placeholder="بحث بالاسم، رقم الجهاز، رقم السيم، الفني..." onkeydown="if(event.key==='Enter')doSearch()"/>
      <button class="srch-btn" onclick="doSearch()">بحث</button>
    </div>
  </div>

  <div class="filters">
    <button class="ftr on" onclick="setFtr('',this)">الكل</button>
    <button class="ftr" onclick="setFtr('نشط',this)">✅ نشط</button>
    <button class="ftr" onclick="setFtr('جديد',this)">🆕 جديد</button>
    <button class="ftr" onclick="setFtr('انتظار',this)">⏳ انتظار</button>
    <button class="ftr" onclick="setFtr('4G',this)">📡 4G</button>
    <button class="ftr" onclick="setFtr('sim-off',this)">🚫 سيم مقطوع</button>
  </div>

  <div class="stats" id="statsBar"></div>

  <div id="out"><div class="empty">🖨️<br><br>ابحث عن أي مطعم أو جهاز أو سيم</div></div>
</div>

<!-- REPORT TAB -->
<div id="tab-report" style="display:none">
  <div class="rep-filters">
    <h3>🔎 فلترة التقارير</h3>
    <div class="rep-row">
      <span class="rep-label">الفني</span>
      <select class="rep-select" id="rTech">
        <option value="">الكل</option>
      </select>
    </div>
    <div class="rep-row">
      <span class="rep-label">من تاريخ</span>
      <input type="date" class="rep-input" id="rFrom">
      <span class="rep-label" style="min-width:40px">إلى</span>
      <input type="date" class="rep-input" id="rTo">
    </div>
    <div class="rep-row">
      <span class="rep-label">سبب الزيارة</span>
      <select class="rep-select" id="rReason">
        <option value="">الكل</option>
      </select>
    </div>
    <div class="rep-row">
      <span class="rep-label">الحالة</span>
      <select class="rep-select" id="rStatus">
        <option value="">الكل</option>
        <option value="نشط">نشط</option>
        <option value="جديد">جديد</option>
        <option value="انتظار">انتظار</option>
      </select>
    </div>
    <div class="rep-row">
      <button class="rep-btn" onclick="renderReport()">تطبيق الفلتر</button>
      <button class="rep-btn" style="background:#1e293b" onclick="resetReport()">إعادة تعيين</button>
      <button class="export-btn" onclick="exportCSV()">📥 تصدير CSV</button>
    </div>
  </div>
  <div id="repOut"></div>
</div>

<script>
// ═══ Sheet IDs ═══
var DASH  = '1TnlxGwD0G6FV654bFCbXmjL4Ek59IGJWkAYYlb_GD7w';
var TVF   = '11iL-WTrWcw9hSn5YD6i1LvLnczMrFu0HInjXmBUCFmo';
var STOCK = '1ZOB4rHFil99StMeaCPm59lDT4vnLkaksY2d-ZszC-t0';
var SIM55 = '1Fwyln1_-ogHjvfnoQnI2tdXTWGRosThZofgjWU2TSl8';
var M2MTP = '1m6AHs66KJ5RbvQUu5vvM0HGmNalMwElS7LBlk8yVEJA';

// ═══ Data store ═══
var D = {dash:[], tvf1:[], tvf2:[], tvf4:[], tvf6:[], tvf7:[], tvf8:[], stock:[], track:[], sim55:[]};
var simMap = {}, sim55Map = {}, stockMap = {};
var openMap = {};
var curFtr = '', lastIdx = {};
var repFiltered = [];

// ═══ Escape HTML ═══
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ═══ GViz loader ═══
async function gviz(id, sheet) {
  var url = 'https://docs.google.com/spreadsheets/d/'+id+'/gviz/tq?tqx=out:json';
  if (sheet) url += '&sheet=' + encodeURIComponent(sheet);
  var r = await fetch(url);
  var t = await r.text();
  var j = JSON.parse(t.replace(/^[^(]+\(/,'').replace(/\);?\s*$/,''));
  var cols = (j.table.cols||[]).map(function(c){ return (c.label||c.id||'').trim(); });
  return (j.table.rows||[]).map(function(row){
    var o = {};
    (row.c||[]).forEach(function(cell,i){
      o[cols[i]] = (cell&&cell.v!=null) ? String(cell.v).trim() : '';
    });
    return o;
  }).filter(function(r){ return Object.values(r).some(function(v){return v&&v!=='#N/A';}); });
}

// ═══ SIM ICCID → MSISDN ═══
function addSim(iccid, msisdn) {
  if (!iccid||!msisdn) return;
  var ic = String(iccid).replace(/\.0+$/,'').replace(/\s/g,'');
  var ms = String(msisdn).replace(/\.0+$/,'').replace(/\s/g,'');
  if (!ic||!ms) return;
  var s = ic.replace(/^0+/,'');
  [ic, s, '0'+s, '00'+s].forEach(function(k){ if(k) simMap[k]=ms; });
}

function toMSISDN(raw) {
  var c = String(raw||'').replace(/\.0+$/,'').replace(/\s/g,'').trim();
  if (!c||c.length<6) return c;
  // Already MSISDN if starts with 07 or 7 or 9647 and short
  if ((c.startsWith('07')||c.startsWith('7')||c.startsWith('9647')) && c.length<=13) return c;
  // Try lookup
  var s = c.replace(/^0+/,'');
  return simMap[c]||simMap[s]||simMap['0'+s]||simMap['00'+s]||c;
}

// ═══ Date parsing — handles all formats ═══
function pd(s) {
  if (!s||s==='#N/A') return new Date(0);
  s = String(s).trim();
  // Date(y,m,d) from gviz
  var gm = s.match(/^Date\((\d+),(\d+),(\d+)/);
  if (gm) return new Date(+gm[1], +gm[2], +gm[3]);
  // Arabic digits
  var ar = {'٠':'0','١':'1','٢':'2','٣':'3','٤':'4','٥':'5','٦':'6','٧':'7','٨':'8','٩':'9'};
  s = s.replace(/[٠-٩]/g, function(d){return ar[d];}).replace(/\u200f|\u200e/g,'');
  // Time part
  var th=0, tm=0;
  var tMatch = s.match(/(\d+):(\d+)/);
  if (tMatch) { th=+tMatch[1]; tm=+tMatch[2]; }
  if (s.includes('م')&&th<12) th+=12;
  if (s.includes('ص')&&th===12) th=0;
  // Try YYYY/MM/DD or YYYY-MM-DD
  var m = s.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if (m) return new Date(+m[1],+m[2]-1,+m[3],th,tm);
  // Try DD/MM/YYYY or D/M/YYYY
  m = s.match(/^(\d{1,2})[\/\\\-](\d{1,2})[\/\\\-](\d{4})/);
  if (m) {
    var d=+m[1], mo=+m[2], y=+m[3];
    // MM/DD/YYYY if month>12 detected by first number
    if (d>12) return new Date(y,mo-1,d,th,tm);
    return new Date(y,mo-1,d,th,tm);
  }
  // Try MM/DD/YYYY American
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m) {
    var a=+m[1], b=+m[2], y=+m[3];
    if (a>12) return new Date(y,b-1,a,th,tm); // DD/MM
    return new Date(y,a-1,b,th,tm); // MM/DD (American)
  }
  return new Date(s) || new Date(0);
}

function fmtDate(s) {
  var d = pd(s);
  if (d.getTime()===0) return s||'—';
  return d.toLocaleDateString('ar-IQ',{year:'numeric',month:'numeric',day:'numeric'});
}

// ═══ Name normalization ═══
var CHICKEN = /تشيكن|تشكين|تشكن|شكين|شيكن|شيكن|جكن|جكين|تشكيين|چكن|chiken|chicken/gi;
var AREA_MAP = [
  [/\bال?زيون[ةه]\b/gi,'زيونه'],
  [/\bال?منصور\b|متصور/gi,'منصور'],
  [/\bال?سيدي[ةه]\b/gi,'سيديه'],
  [/\bال?عامري[ةه]\b/gi,'عامريه'],
  [/\bال?جادري[ةه]\b|حادري[ةه]/gi,'جادريه'],
  [/\bال?اعظمي[ةه]\b|اعضمي[ةه]/gi,'اعظميه'],
  [/\bال?جامع[ةه]\b|حي\s*الجامع[ةه]/gi,'جامعه'],
  [/\bال?كراد[ةه]\b|\b6[24]?\b|٦٢|٤٢|٥٢|\b\d{2}\b(?=\s*$)/gi,'كراده'],
  [/شارع\s*فلسطين|ش\.?\s*فلسطين/gi,'فلسطين'],
  [/\bال?جهاد\b/gi,'جهاد'],
  [/\bال?شعب\b/gi,'شعب'],
  [/\bال?كرخ\b/gi,'كرخ'],
  [/\bال?بلديات\b/gi,'بلديات'],
  [/\bال?غزالي[ةه]\b/gi,'غزاليه'],
  [/\bال?يرموك\b/gi,'يرموك'],
  [/\bال?زعفراني[ةه]\b/gi,'زعفرانيه'],
  [/\bال?بنوك\b/gi,'بنوك'],
  [/\bال?مشتل\b/gi,'مشتل'],
  [/\bال?اعظميه?\b/gi,'اعظميه'],
  [/حي\s*ال?/gi,''],
];

function normKey(name) {
  var n = String(name||'').replace(/\s+/g,' ').trim().toLowerCase();
  n = n.replace(CHICKEN,'جكن');
  AREA_MAP.forEach(function(pair){ n=n.replace(pair[0],pair[1]); });
  // Remove ال prefix from remaining words
  n = n.replace(/\bال/g,'');
  // Remove tashkeel
  n = n.replace(/[\u064b-\u065f]/g,'');
  // Normalize ta marbuta
  n = n.replace(/ة\b/g,'ه');
  return n.replace(/\s+/g,' ').trim();
}

// ═══ cv helper — get first non-empty field ═══
function gv(r) {
  return function() {
    for (var i=0;i<arguments.length;i++) {
      var v=r[arguments[i]];
      if (v&&v.trim&&v.trim()&&v!=='#N/A') return v.trim();
    }
    return '';
  };
}

// ═══ Tech normalization ═══
var TECH_MAP = {
  'علي مصطفى':'علي متولي',
  'علي مصطفي':'علي متولي',
  'ali mustafa':'علي متولي',
};
function normTech(t) { return TECH_MAP[t]||t; }

// ═══ Build search index ═══
function buildIndex() {
  var idx = {};

  function addRec(name, rec, src) {
    if (!name||name.length<2) return;
    var k = normKey(name);
    if (!idx[k]) idx[k] = {displayName:name, key:k, dash:[], tvf:[], tvfDev:[]};
    if (src==='dash') idx[k].dash.push(rec);
    else if (src==='tvf') idx[k].tvf.push(rec);
    else if (src==='tvfDev') idx[k].tvfDev.push(rec);
    // Update displayName to most recent
    if (rec._src==='dash') idx[k].displayName = name;
  }

  D.dash.forEach(function(r){ r._src='dash'; addRec(r['اسم المطعم'],r,'dash'); });

  [D.tvf2, D.tvf4, D.tvf6, D.tvf7, D.tvf8].forEach(function(arr){
    arr.forEach(function(r){
      var name = r['اسم المطعم']||r['اسم الوظف']||r['restaurant']||'';
      if (name) addRec(name, r, 'tvf');
    });
  });

  // TVF1 has device/sim but no restaurant name — link via device
  D.tvf1.forEach(function(r){
    var dev = (r['رقم الجهاز']||r['رقم الجهاز ']||'').trim().replace(/\.0+$/,'');
    if (!dev) return;
    // Find which restaurant this device belongs to
    var nm = stockMap[dev]&&stockMap[dev].name ? stockMap[dev].name : '';
    if (nm) addRec(nm, r, 'tvf');
  });

  // Sort each group dash records newest first
  Object.values(idx).forEach(function(g){
    g.dash.sort(function(a,b){ return pd(b['submittedAt']||b['date']||'')-pd(a['submittedAt']||a['date']||''); });
    g.tvf.sort(function(a,b){
      var da = b['Timestamp']||b['كرل دايت']||b['التاريخ']||'';
      var db = a['Timestamp']||a['كرل دايت']||a['التاريخ']||'';
      return pd(da)-pd(db);
    });
  });

  return idx;
}

// ═══ Smart search score ═══
function score(name, q) {
  var n = normKey(name), qn = normKey(q);
  if (!n||!qn) return 0;
  if (n===qn) return 1;
  if (n.includes(qn)||qn.includes(n)) return 0.92;
  var qw = qn.split(' ').filter(function(w){return w.length>1;});
  if (!qw.length) return 0;
  var all = qw.every(function(w){return n.includes(w);});
  if (all) return 0.88;
  var mc = qw.filter(function(w){return n.includes(w);}).length;
  if (mc===0) return 0;
  if (qw.length>=2&&mc===1) return 0.3;
  return 0.6*(mc/qw.length);
}

// ═══ Filters ═══
function setFtr(f, el) {
  curFtr = f;
  document.querySelectorAll('.ftr').forEach(function(e){e.classList.remove('on');});
  el.classList.add('on');
  doSearch();
}

// ═══ Main search ═══
function doSearch() {
  var q = (document.getElementById('si').value||'').trim();
  var idx = lastIdx;
  if (!Object.keys(idx).length) { document.getElementById('out').innerHTML='<div class="empty">⏳ جاري التحميل...</div>'; return; }

  var keys = Object.keys(idx);

  // If query looks like device number
  if (q && /^(v[bsenpth]|VB|VS|VE|VN|VP|VT|PE)\d*/i.test(q)) {
    showDeviceSearch(q); return;
  }
  // If query looks like SIM
  if (q && /^(07\d|7\d|964\d|\d{10,})/i.test(q.replace(/\s/g,''))) {
    showSimSearch(q); return;
  }

  // Name search + filter
  var results = [];
  keys.forEach(function(k){
    var g = idx[k];
    var sc2 = q ? score(g.displayName, q) : 1;
    if (sc2 < 0.28) return;

    // Apply status/sim filter
    var latest = g.dash[0];
    if (curFtr) {
      if (curFtr==='4G') { if (!latest||latest['حالة SIM']!=='4G') return; }
      else if (curFtr==='sim-off') { if (!latest||latest['حالة SIM']!=='غير فعال') return; }
      else { if (!latest||latest['status']!==curFtr) return; }
    }

    results.push({g:g, sc:sc2, latest:latest});
  });

  // Sort: by score then by date
  results.sort(function(a,b){
    if (Math.abs(a.sc-b.sc)>0.05) return b.sc-a.sc;
    var da = a.latest?pd(a.latest['submittedAt']||''):new Date(0);
    var db = b.latest?pd(b.latest['submittedAt']||''):new Date(0);
    return db-da;
  });

  // Stats
  var tot=results.length, act=0, nw=0, wt=0;
  results.forEach(function(r){
    var st=r.latest?r.latest['status']||'':'';
    if(st==='نشط')act++; if(st==='جديد')nw++; if(st==='انتظار')wt++;
  });
  document.getElementById('statsBar').innerHTML =
    '<div class="stat"><div class="stat-n">'+tot+'</div><div class="stat-l">إجمالي</div></div>'+
    '<div class="stat"><div class="stat-n" style="color:#4ade80">'+act+'</div><div class="stat-l">نشط</div></div>'+
    '<div class="stat"><div class="stat-n" style="color:#93c5fd">'+nw+'</div><div class="stat-l">جديد</div></div>'+
    '<div class="stat"><div class="stat-n" style="color:#fbbf24">'+wt+'</div><div class="stat-l">انتظار</div></div>';

  if (!results.length) {
    document.getElementById('out').innerHTML = '<div class="empty">🔍 لا نتائج لـ "'+esc(q)+'"<br><span style="font-size:12px;color:#1e3a5f">جرب جزء من الاسم</span></div>';
    return;
  }

  var html = '';
  results.slice(0,120).forEach(function(item){
    html += renderGroup(item.g, item.latest);
  });
  document.getElementById('out').innerHTML = html;
}

// ═══ Device search ═══
function showDeviceSearch(q) {
  var ql = q.toLowerCase().replace(/\s/g,'');
  var results = [];
  D.dash.forEach(function(r){
    var dev = (r['رقم جهاز POS']||'').toLowerCase().replace(/\s/g,'');
    if (dev && dev.includes(ql)) results.push({r:r, src:'dash'});
  });
  D.tvf1.forEach(function(r){
    var dev = (r['رقم الجهاز']||r['رقم الجهاز ']||'').toLowerCase().replace(/\s/g,'');
    if (dev && dev.includes(ql)) results.push({r:r, src:'tvf1'});
  });
  D.track.forEach(function(r){
    var dev = (r['vs']||r['VS']||'').toLowerCase().replace(/\s/g,'');
    if (dev && dev.includes(ql)) results.push({r:r, src:'track'});
  });

  results.sort(function(a,b){
    var da = a.src==='dash'?pd(a.r['submittedAt']||''):a.src==='tvf1'?pd(a.r['Timestamp']||''):pd(a.r['date']||'');

function getRepFiltered() {
  var tech = document.getElementById('rTech').value;
  var fromV = document.getElementById('rFrom').value;
  var toV = document.getElementById('rTo').value;
  var reason = document.getElementById('rReason').value;
  var status = document.getElementById('rStatus').value;
  var fromD = fromV ? new Date(fromV) : null;
  var toD = toV ? new Date(toV+'T23:59:59') : null;

  return D.dash.filter(function(r){
    var t = normTech(r['اسم الموظف المسؤول']||r['اسم الوظف']||'');
    if (tech && t!==tech) return false;
    var d = pd(r['submittedAt']||r['date']||'');
    if (fromD && d < fromD) return false;
    if (toD && d > toD) return false;
    if (reason && (r['سبب الزيارة']||'')!==reason) return false;
    if (status && (r['status']||'')!==status) return false;
    return true;
  }).sort(function(a,b){ return pd(b['submittedAt']||'')-pd(a['submittedAt']||''); });
}

function exportCSV() {
  var rows = repFiltered.length ? repFiltered : D.dash;
  var headers = ['التاريخ','اسم المطعم','الفني','الحالة','رقم الجهاز','رقم السيم','سبب الزيارة','حالة السيم','الملاحظات','العنوان'];
  var csv = headers.join(',') + '\n';
  rows.forEach(function(r){
    var v=gv(r);
    var row = [
      fmtDate(v('submittedAt','date')),
      v('اسم المطعم'),
      normTech(v('اسم الموظف المسؤول','اسم الوظف')),
      v('status'),
      v('رقم جهاز POS'),
      toMSISDN(v('رقم SIM كارت POS','رقم السيم')),
      v('سبب الزيارة'),
      v('حالة SIM'),
      v('ملاحظات','ملاحظة'),
      v('العنوان')
    ].map(function(s){ return '"'+(s||'').replace(/"/g,'""')+'"'; });
    csv += row.join(',') + '\n';
  });
  var blob = new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'pos-report-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

// ═══ Tab switch ═══
function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  el.classList.add('on');
  document.getElementById('tab-search').style.display = tab==='search'?'':'none';
  document.getElementById('tab-report').style.display = tab==='report'?'':'none';
  if (tab==='report') renderReport();
}

// ═══ Load all sheets ═══
async function loadAll() {
  var dot = document.getElementById('dot');
  var stxt = document.getElementById('stxt');

  try {
    stxt.textContent = 'جاري تحميل الشيتات...';
    var _r = await Promise.all([
      gviz(DASH).catch(function(e){console.warn('dash1',e);return [];}),
      gviz(DASH,'ورقة1').catch(function(e){console.warn('dash2',e);return [];}),
      gviz(TVF,'Form Responses 1').catch(function(){return [];}),
      gviz(TVF,'Form Responses 2').catch(function(){return [];}),
      gviz(TVF,'Form Responses 4').catch(function(){return [];}),
      gviz(TVF,'Sheet6').catch(function(){return [];}),
      gviz(TVF,'Sheet7').catch(function(){return [];}),
      gviz(TVF,'Sheet8').catch(function(){return [];}),
      gviz(STOCK).catch(function(){return [];}),
      gviz(STOCK,'tracking').catch(function(){return [];}),
      gviz(SIM55).catch(function(){return [];}),
      gviz(M2MTP,'Sheet1').catch(function(){return [];}),
      gviz(M2MTP,'الورقة1').catch(function(){return [];})
    ]);

    var dash1=_r[0], dash2=_r[1],
        tvf1=_r[2], tvf2=_r[3], tvf4=_r[4], tvf6=_r[5], tvf7=_r[6], tvf8=_r[7],
        stock=_r[8], trackRaw=_r[9],
        sim55Raw=_r[10], m1=_r[11], m2=_r[12];

    // Build M2MTP map
    m1.concat(m2).forEach(function(r){
      var keys = Object.keys(r);
      var iccid = r['ICCID']||r[keys[0]]||'';
      var msisdn = r['MSISDN']||r[keys[1]]||'';
      addSim(iccid, msisdn);
    });

    // Build sim55 map
    sim55Raw.forEach(function(r){
      var ms = String(r['ارقام']||r['ارقام ']||'').replace(/\.0+$/,'').replace(/\s/g,'').trim();
      if (ms && ms!=='#N/A' && ms.length>4) {
        sim55Map[ms] = {
          email:   r['الايميل']||r['email']||'',
          name:    r['اسم المطعم']||'',
          status:  r['الحالة']||'',
          blocked: r['بلوك']||''
        };
      }
    });

    // Build stock map
    stock.forEach(function(r){
      var vs = String(r['vs']||r['VS']||'').replace(/\.0+$/,'').trim();
      if (vs && vs.length>3) {
        stockMap[vs] = {
          name:   r['rest name']||r['REST NAME']||'',
          email:  r['email']||r['EMAIL']||'',
          status: r['status']||r['Status']||''
        };
      }
    });

    // Merge dash — filter and deduplicate
    var allDash = dash1.concat(dash2).filter(function(r){
      var nm = r['اسم المطعم']||'';
      return nm.length>1;
    });
    var seen = {};
    D.dash = allDash.filter(function(r){
      var id = r['id']||(r['اسم المطعم']+'|'+r['submittedAt']);
      if (seen[id]) return false; seen[id]=true; return true;
    });

    D.tvf1=tvf1; D.tvf2=tvf2; D.tvf4=tvf4;
    D.tvf6=tvf6; D.tvf7=tvf7; D.tvf8=tvf8;
    D.stock=stock; D.track=trackRaw; D.sim55=sim55Raw;

    // Build index
    lastIdx = buildIndex();

    // Populate report dropdowns
    populateReportDropdowns();

    dot.style.background = '#22c55e';
    dot.style.animation = 'none';
    stxt.textContent = D.dash.length+' تاسك · '+Object.keys(lastIdx).length+' مطعم';

    doSearch();
  } catch(e) {
    dot.style.background = '#ef4444';
    stxt.textContent = 'خطأ في التحميل!';
    document.getElementById('out').innerHTML = '<div class="empty">❌ '+esc(e.message)+'</div>';
    console.error(e);
  }
}

loadAll();
</script>

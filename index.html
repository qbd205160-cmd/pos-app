<style>

body{background:#07090f;color:#e2e8f0;font-family:'Tajawal',sans-serif;direction:rtl}

<body>
<div class="hdr">

<script>
var DASH='1TnlxGwD0G6FV654bFCbXmjL4Ek59IGJWkAYYlb_GD7w';
var TVF='11iL-WTrWcw9hSn5YD6i1LvLnczMrFu0HInjXmBUCFmo';
// TVF sheets
var TVF_FR1='Form Responses 1';
var TVF_FR2='Form Responses 2';
var TVF_FR4='Form Responses 4';
var TVF_S5='Form Responses 5';
var TVF_S6='Sheet6';
var TVF_S7='Sheet7';
var TVF_S8='Sheet8';
var STOCK='1ZOB4rHFil99StMeaCPm59lDT4vnLkaksY2d-ZszC-t0';
var SIM55='1Fwyln1_-ogHjvfnoQnI2tdXTWGRosThZofgjWU2TSl8';
var TRACK='1ZOB4rHFil99StMeaCPm59lDT4vnLkaksY2d-ZszC-t0';
var TRACK_S='tracking';

var D={dash:[],tvf:[],tvfR:[],stock:[],sim:[],track:[]};
var loaded=false;
var _branches=[];
var _lastQ='';
var _repData=[];

// ── gviz ─────────────────────────────────────────────────────
async function gvizH1(id,sheet){
  // قراءة شيت الهيدر في الصف الأول (headers=1)
  var url='https://docs.google.com/spreadsheets/d/'+id+'/gviz/tq?tqx=out:json&headers=1'+(sheet?'&sheet='+encodeURIComponent(sheet):'');
  var r=await fetch(url);
  var t=await r.text();
  var j=JSON.parse(t.replace(/^[^(]+\(/,'').replace(/\);\s*$/,''));
  var cols=(j.table.cols||[]).map(function(c){return(c.label||c.id||'').trim();});
  return(j.table.rows||[]).map(function(row){
    var o={};
    (row.c||[]).forEach(function(cell,i){o[cols[i]]=(cell&&cell.v!=null)?String(cell.v).trim():'';});
    return o;
  }).filter(function(o){return Object.values(o).some(function(v){return v;});});
}
async function gvizCSV(id,sheet){
  // قراءة CSV تحافظ على الأرقام كنص بدون فقدان الأصفار
  var url='https://docs.google.com/spreadsheets/d/'+id+'/gviz/tq?tqx=out:csv'+(sheet?'&sheet='+encodeURIComponent(sheet):'');
  var r=await fetch(url);
  var t=await r.text();
  var lines=t.trim().split('\n');
  if(lines.length<2)return[];
  function parseCSVLine(line){
    var result=[],cur='',inQ=false;
    for(var i=0;i<line.length;i++){
      var c=line[i];
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){result.push(cur.trim());cur='';}
      else{cur+=c;}
    }
    result.push(cur.trim());
    return result;
  }
  var cols=parseCSVLine(lines[0]).map(function(c){return c.replace(/^"|"$/g,'').trim();});
  return lines.slice(1).map(function(line){
    var vals=parseCSVLine(line);
    var o={};
    cols.forEach(function(col,i){o[col]=(vals[i]||'').replace(/^"|"$/g,'').trim();});
    return o;
  }).filter(function(o){return Object.values(o).some(function(v){return v;});});
}
async function gviz(id,sheet){
  var url='https://docs.google.com/spreadsheets/d/'+id+'/gviz/tq?tqx=out:json'+(sheet?'&sheet='+encodeURIComponent(sheet):'');
  var r=await fetch(url);
  var t=await r.text();
  var j=JSON.parse(t.replace(/^[^(]+\(/,'').replace(/\);\s*$/,''));
  var cols=j.table.cols.map(function(c){return(c.label||c.id||'').trim();});
  return(j.table.rows||[]).map(function(row){
    var o={};
    (row.c||[]).forEach(function(cell,i){
      o[cols[i]]=cell?(cell.f!=null?String(cell.f).trim():(cell.v!=null?String(cell.v).trim():'')):'';
    });
    return o;
  }).filter(function(o){return Object.values(o).some(function(v){return v;});});
}

// ── Load ─────────────────────────────────────────────────────
async function loadAll(){
  setSt('ld','جاري تحميل...');
  D={dash:[],tvf:[],tvf4:[],stock:[],sim:[],track:[]};
  loaded=false;
  try{
    // تحميل كل الشيتات بالتوازي
    var r=await Promise.all([
      gviz(DASH).catch(function(){return [];}),
      gviz(DASH,'ورقة1').catch(function(){return [];}),
      gvizCSV(TVF,TVF_FR1).catch(function(){return [];}),
      gviz(TVF,TVF_FR2).catch(function(){return [];}),
      gviz(TVF,TVF_FR4).catch(function(){return [];}),
      gviz(TVF,TVF_S6).catch(function(){return [];}),
      gviz(TVF,TVF_S7).catch(function(){return [];}),
      gviz(TVF,TVF_S8).catch(function(){return [];}),
      gviz(STOCK).catch(function(){return [];}),
      gviz(SIM55).catch(function(){return [];}),
      gvizH1(TRACK,TRACK_S).catch(function(){return [];})
    ]);
    D.dash=r[0].concat(r[1]);
    D.dash.sort(function(a,b){return pd(cv(b,'submittedAt'))-pd(cv(a,'submittedAt'));});
    D.tvf=r[2]; // FR1: رقم الجهاز + السيم
    D.tvfR=r[3].concat(r[4]).concat(r[5]).concat(r[6]).concat(r[7]); // FR2+FR4+S6+S7+S8: اسم المطعم
    D.tvfR.sort(function(a,b){return pd(cv(b,'كرل دايت','التاريخ','Timestamp'))-pd(cv(a,'كرل دايت','التاريخ','Timestamp'));});
    D.stock=r[8];
    D.sim=r[9];
    D.track=r[10];

    loaded=true;
    setSt('ok','✅ '+D.dash.length+' dash · '+(D.tvf.length+D.tvfR.length)+' TVF · '+D.stock.length+' stock · '+D.sim.length+' sim');
    buildRepFilters();
  }catch(e){setSt('err','فشل: '+e.message);}
}

// ── Helpers ───────────────────────────────────────────────────
function cv(r){for(var i=1;i<arguments.length;i++){var k=arguments[i];if(r&&r[k]!==undefined&&r[k]!=='')return r[k];if(r&&r[k+' ']!==undefined&&r[k+' ']!=='')return(r[k+' ']+'').trim();}return'';}
function nd(s){return(s||'').toLowerCase().replace(/[\s\-]/g,'');}
function ns(s){
  // تنظيف الرقم: إزالة .0 والرموز وكود الدولة والصفر البادئ
  var c=String(s||'').replace(/\.0+$/,'').replace(/\D/g,'');
  c=c.replace(/^00964/,'').replace(/^964/,'').replace(/^0/,'');
  return c;
}
function simMatch(a,b){
  // مقارنة رقمين سيم بكل الاحتمالات
  var na=ns(a), nb=ns(b);
  if(!na||!nb||na.length<7||nb.length<7)return false;
  // تطابق كامل
  if(na===nb)return true;
  // أحدهما نهاية الآخر
  if(na.endsWith(nb)||nb.endsWith(na))return true;
  // آخر 9 أرقام
  if(na.slice(-9)===nb.slice(-9))return true;
  return false;
}

function pd(s){
  if(!s)return new Date(0);
  s=String(s).trim();
  // gviz Date(year,month,day) - months 0-indexed
  var gm=s.match(/^Date\((\d+),(\d+),(\d+)\)/);
  if(gm)return new Date(parseInt(gm[1]),parseInt(gm[2]),parseInt(gm[3]));
  // Arabic numerals + RTL mark
  var ar={'٠':'0','١':'1','٢':'2','٣':'3','٤':'4','٥':'5','٦':'6','٧':'7','٨':'8','٩':'9'};
  for(var k in ar)s=s.split(k).join(ar[k]);
  s=s.replace(/\u200f/g,'').trim();
  // Extract date parts
  var m=s.match(/(\d+)[\/\-](\d+)[\/\-](\d+)/);
  if(!m)return new Date(0);
  var a=parseInt(m[1]),b=parseInt(m[2]),c=parseInt(m[3]);
  var y,mo,d;
  // YYYY/MM/DD or YYYY-MM-DD: a >= 2000
  if(a>=2000){y=a;mo=b;d=c;}
  // last part is year (>= 2000)
  else if(c>=2000){
    if(a>12){y=c;mo=b;d=a;} // DD/MM/YYYY
    else if(b>12){y=c;mo=a;d=b;} // MM/DD/YYYY
    else{y=c;mo=b;d=a;} // default DD/MM/YYYY (Iraqi)
  }
  else return new Date(0);
  // Time
  var t=s.match(/(\d+):(\d+)/),h=t?parseInt(t[1]):0,mn=t?parseInt(t[2]):0;
  if(s.includes('م')&&h<12)h+=12;
  if(s.includes('ص')&&h===12)h=0;
  return new Date(y,mo-1,d,h,mn);
}

function pdStr(s){
  var d=pd(s);
  if(!d||d<=new Date(0))return '';
  var y=d.getFullYear(),mo=d.getMonth()+1,dy=d.getDate();
  return y+'-'+(mo<10?'0':'')+mo+'-'+(dy<10?'0':'')+dy;
}

function fmtDate(s){
  if(!s)return '';
  s=String(s).trim();
  var gm=s.match(/^Date\((\d+),(\d+),(\d+)\)/);
  if(gm){var mo=parseInt(gm[2])+1;return parseInt(gm[3])+'/'+mo+'/'+gm[1];}
  return s;
}

function normTech(t){
  if(!t)return '';
  var tl=t.trim().toLowerCase();
  if(tl.includes('علي')&&(tl.includes('مصطفى')||tl.includes('مصطفي')||tl.includes('متولي')||tl.includes('باريس')))return 'علي متولي';
  if(tl.includes('محمد')&&(tl.includes('غزوان')||tl.includes('العنبر')||tl.includes('زاهد')))return 'محمد غزوان';
  if(tl.includes('قيصر')||tl==='qaiser'||tl==='qaesar')return 'قيصر';
  if(tl.includes('لهيب')||tl==='laheeb')return 'لهيب';
  return t.trim();
}

function normKey(n){
  if(!n)return '';
  var s=n.trim().toLowerCase();
  var nums={'٠':'0','١':'1','٢':'2','٣':'3','٤':'4','٥':'5','٦':'6','٧':'7','٨':'8','٩':'9'};
  for(var k in nums)s=s.split(k).join(nums[k]);
  // رقم في نهاية الاسم = كراده
  s=s.replace(/\s+\d{2}\s*$/,' كراده');
  // توحيد chicken
  s=s.replace(/تشيكن|تشكين|تشكن|شكين|شكن|شيكين|شيكن|جيكن/g,'جكن');
  s=s.replace(/جكنن/g,'جكن');
  // توحيد المناطق
  s=s.replace(/ش\.?\s*فلسطين|شارع\s*فلسطين/g,'فلسطين');
  s=s.replace(/حي\s*/g,'');
  s=s.replace(/اعظميه|اعظمية|الاعظميه|الاعظمية|اعضميه|اعضمية|الاعضميه|الاعضمية/g,'اعظميه');
  s=s.replace(/جادريه|جادرية|الجادريه|الجادرية|حادرية|الحادرية/g,'جادريه');
  s=s.replace(/زيونه|زيونة|الزيونه|الزيونة/g,'زيونه');
  s=s.replace(/سيديه|سيدية|السيديه|السيدية/g,'سيديه');
  s=s.replace(/منصور|المنصور|متصور|المتصور/g,'منصور');
  s=s.replace(/الكراده|الكرادة|كراده|كرادة|الكراد|كراد/g,'كراده');
  s=s.replace(/الجامعه|الجامعة|جامعه|جامعة/g,'جامعه');
  s=s.replace(/الزعفرانيه|الزعفرانية|زعفرانيه|زعفرانية/g,'زعفرانيه');
  s=s.replace(/العامريه|العامرية|عامريه|عامرية/g,'عامريه');
  s=s.replace(/البلديات|بلديات/g,'بلديات');
  s=s.replace(/البنوك|بنوك/g,'بنوك');
  s=s.replace(/الغزاليه|الغزالية|غزاليه|غزالية/g,'غزاليه');
  s=s.replace(/الشعب|شعب/g,'شعب');
  s=s.replace(/الاعلام|اعلام/g,'اعلام');
  // ال التعريف
  s=s.replace(/(^| )ال/g,'$1');
  // / و -
  s=s.replace(/\s*[\/\-]\s*/g,' ').trim();
  // ة -> ه
  s=s.replace(/ة/g,'ه');
  s=s.replace(/[إأآ]/g,'ا').replace(/ى/g,'ي');
  return s.replace(/\s+/g,' ').trim();
}

function score(name,q){
  name=(name||'').toLowerCase().trim();
  q=(q||'').toLowerCase().trim();
  if(!name||!q)return 0;
  if(name===q)return 1;
  if(name.includes(q))return 0.95;
  if(q.includes(name))return 0.85;
  var w=q.split(/\s+/);
  var mc=w.filter(function(x){return name.includes(x);}).length;
  if(mc===0){var si=0;for(var i=3;i<=q.length;i++){if(name.includes(q.slice(0,i)))si=i;}return si>=3?0.4*(si/q.length):0;}
  if(w.length===1)return 0.8;
  return 0.6*(mc/w.length);
}

  [D.dash,D.tvf,D.tvf4,D.stock].forEach(function(arr){
    arr.forEach(function(r){
      var dev=cv(r,'رقم جهاز POS','vs','VS')||fdev(r);

          dev:dev,
          name:cv(r,'اسم المطعم','rest name','اسم الوظف'),

          date:cv(r,'submittedAt','Timestamp','date'),

      +'</div></div><span style="color:#3b82f6">◀</span></div>';

// دالة تجمع كل السجلات من شيت محدد وتضيف مصدرها وتاريخها
function getAllRecords() {
  var all = [];

  // Dashboard
  (D.dash||[]).forEach(function(r){
    all.push({
      _src:'dash', _date:pd(cv(r,'submittedAt')),
      name: cv(r,'اسم المطعم'),
      dev:  cv(r,'رقم جهاز POS'),
      sim:  cv(r,'رقم SIM كارت POS'),
      tech: cv(r,'اسم الموظف المسؤول'),
      status: cv(r,'status'),
      reason: cv(r,'سبب الزيارة'),
      note:   cv(r,'ملاحظات'),
      addr:   cv(r,'العنوان'),
      _raw: r
    });
  });

  // TVF FR2/FR4/S6/S7/S8 (tvfR + tvf4)
  (D.tvfR||[]).concat(D.tvf4||[]).forEach(function(r){
    all.push({
      _src:'tvf4', _date:pd(cv(r,'الطابع الزمني','Timestamp')),
      name: cv(r,'اسم المطعم'),
      dev:  cv(r,'POS number','POS number '),
      sim:  cv(r,'SIM number','SIM number '),
      tech: cv(r,'اسم الموظف','اسم الوظف','اسم الموظف '),
      status: cv(r,'صيانة جهاز'),
      reason: cv(r,'سبب الزيارة/ توزيع','سبب الزيارة'),
      note:   cv(r,'ملاحظة'),
      addr:   cv(r,'الموقع'),
      gsm:    cv(r,'GSM'),
      comp:   cv(r,'المنافسين'),
      cc:     cv(r,'هل التاسك عن طريق كول سنتر'),
      _raw: r
    });
  });

  // TVF FR1 (tvf) — رقم الجهاز + السيم بدون اسم
  (D.tvf||[]).forEach(function(r){
    all.push({
      _src:'tvf1', _date:pd(cv(r,'Timestamp')),
      name: '',
      dev:  cv(r,'رقم الجهاز','رقم الجهاز '),
      sim:  cv(r,'رقم السم كارت','رقم السم كارت '),
      tech: cv(r,'اسم الوظف','اسم الوظف '),
      reason: cv(r,'توزيع /راجاع'),
      note:   cv(r,'ملاحظة'),
      _raw: r
    });
  });

  // Tracking
  (D.track||[]).forEach(function(r){
    all.push({
      _src:'track', _date:pd(cv(r,'date')),
      name: cv(r,'rest name'),
      dev:  cv(r,'vs'),
      sim:  cv(r,'msid'),
      tech: cv(r,'team'),
      status: cv(r,'status'),
      _raw: r
    });
  });

  // SIM55
  (D.sim||[]).forEach(function(r){
    all.push({
      _src:'sim55', _date:new Date(0),
      name: cv(r,'اسم المطعم'),
      sim:  cv(r,'ارقام','ارقام '),
      email:cv(r,'انك'),
      status:cv(r,'الحالة'),
      _raw: r
    });
  });

  return all;
}

// البحث الموحد
function unifiedSearch(q) {
  var all = getAllRecords();
  var ql = nd(q);
  var isNum = /^\d{7,}$/.test(q.replace(/\D/g,''));
  var isVB = /^v[bse]/i.test(q) && q.length > 4;

  // فلتر السجلات
  var matched = all.filter(function(rec) {
    if (isVB) {
      // بحث برقم الجهاز
      return nd(rec.dev).includes(ql);
    } else if (isNum) {
      // بحث برقم السيم
      return simMatch(rec.sim, q);
    } else {
      // بحث بالاسم
      return score(rec.name, q) > 0.3;
    }
  });

  if (!matched.length) { noRes(q); return; }

  // اجمع كل أسماء المطاعم الموجودة
  var names = {};
  matched.forEach(function(rec) {
    if (rec.name && rec.name.length > 1) {
      var k = normKey(rec.name);
      if (!names[k]) names[k] = rec.name;
    }
  });

  // إذا ما عندنا اسم من TVF4، جرب نجد الاسم عبر رقم الجهاز من dashboard
  if (!Object.keys(names).length) {
    matched.forEach(function(rec) {
      if (rec.dev && rec.dev.length > 4) {
        all.forEach(function(r2) {
          if (r2.name && r2.name.length > 1 && nd(r2.dev) === nd(rec.dev)) {
            var k = normKey(r2.name);
            if (!names[k]) names[k] = r2.name;
          }
        });
      }
    });
  }

  // اجمع كل السجلات لكل اسم مطعم
  var nameKeys = Object.keys(names);
  if (!nameKeys.length) {
    // ما في اسم — اعرض ما عندنا مباشرة
    var recs = matched;
    recs.sort(function(a,b){return b._date-a._date;});
    var best = recs[0];
    var sim55 = D.sim.filter(function(r){return simMatch(cv(r,'ارقام'),best.sim||q);});
    document.getElementById('res').innerHTML = buildCard({
      name: best.name||q, dev: best.dev||q, sim: best.sim,
      dash: matched.filter(function(r){return r._src==='dash';}).map(function(r){return r._raw;}),
      tvf:  matched.filter(function(r){return r._src==='tvf1';}).map(function(r){return r._raw;}),
      tvf4: matched.filter(function(r){return r._src==='tvf4';}).map(function(r){return r._raw;}),
      stock:[], sim55:sim55,
      track:matched.filter(function(r){return r._src==='track';}).map(function(r){return r._raw;})
    }) + '<button class="ebtn">📥 CSV</button>';
    return;
  }

  // اعرض أول مطعم (الأكثر تطابقاً)
  var bestName = names[nameKeys[0]];
  showRestaurant(bestName, all, q);
}

// عرض مطعم محدد بكل سجلاته من كل الشيتات
function showRestaurant(name, all, origQ) {
  var nk = normKey(name);

  // اجمع كل السجلات المتعلقة بهذا المطعم
  var dash=[], tvf1=[], tvf4=[], track=[], sim55=[];
  var devs = {}, sims = {};

  all.forEach(function(rec) {
    var match = normKey(rec.name||'') === nk;
    if (match) {
      if (rec.dev && rec.dev.length>4) devs[nd(rec.dev)] = rec.dev;
      if (rec.sim && rec.sim.length>4) sims[ns(rec.sim)] = rec.sim;
      if (rec._src==='dash')  dash.push(rec._raw);
      if (rec._src==='tvf1')  tvf1.push(rec._raw);
      if (rec._src==='tvf4')  tvf4.push(rec._raw);
      if (rec._src==='track') track.push(rec._raw);
      if (rec._src==='sim55') sim55.push(rec._raw);
    }
  });

  // ابحث أيضاً بأرقام الأجهزة والسيم عبر كل الشيتات
  all.forEach(function(rec) {
    var devMatch = rec.dev && devs[nd(rec.dev)];
    var simMatch2 = rec.sim && Object.keys(sims).some(function(sk){return simMatch(rec.sim, sims[sk]);});
    if (!devMatch && !simMatch2) return;
    if (rec.dev && rec.dev.length>4) devs[nd(rec.dev)] = rec.dev;
    if (rec.sim && rec.sim.length>4) sims[ns(rec.sim)] = rec.sim;
    if (rec._src==='dash'  && dash.indexOf(rec._raw)<0)  dash.push(rec._raw);
    if (rec._src==='tvf1'  && tvf1.indexOf(rec._raw)<0)  tvf1.push(rec._raw);
    if (rec._src==='tvf4'  && tvf4.indexOf(rec._raw)<0)  tvf4.push(rec._raw);
    if (rec._src==='track' && track.indexOf(rec._raw)<0) track.push(rec._raw);
    if (rec._src==='sim55' && sim55.indexOf(rec._raw)<0) sim55.push(rec._raw);
  });

  // ترتيب من الأحدث
  function sortByDate(arr, dateKey) {
    arr.sort(function(a,b){
      return pd(cv(b,dateKey))-pd(cv(a,dateKey));
    });
  }
  sortByDate(dash, 'submittedAt');
  sortByDate(tvf4, 'الطابع الزمني');
  sortByDate(tvf1, 'Timestamp');

  // أفضل رقم جهاز وسيم
  var bestDev = Object.values(devs)[0]||'';
  var bestSim = Object.values(sims)[0]||'';

  document.getElementById('res').innerHTML = buildCard({
    name: name, dev: bestDev, sim: bestSim,
    dash: dash, tvf: tvf1, tvf4: tvf4,
    stock: D.stock.filter(function(r){return nd(cv(r,'vs','VS'))===nd(bestDev);}),
    sim55: sim55, track: track
  }) + '<button class="ebtn">📥 CSV</button>';
}

function byDev(q)  { unifiedSearch(q); }
function bySim(q)  { unifiedSearch(q); }
function byName(q) {
  var all = getAllRecords();
  var matched = all.filter(function(rec){ return score(rec.name, q) > 0.3; });
  if (!matched.length) { noRes(q); return; }
  // أعلى نتيجة
  var best = matched.sort(function(a,b){ return score(b.name,q)-score(a.name,q); })[0];
  showRestaurant(best.name, all, q);
}

// ── Build Card ────────────────────────────────────────────────
function buildCard(data){
  var t=latestDash(data)||null;
  var tv=data.tvf&&data.tvf.length?data.tvf[0]:null;
  // ترتيب tvf4 من الأحدث
  var tv4All=(data.tvf4||[]).concat(data.tvfR||[]);
  tv4All.sort(function(a,b){return pd(cv(b,'الطابع الزمني','Timestamp'))-pd(cv(a,'الطابع الزمني','Timestamp'));});
  var tv4=tv4All.length?tv4All[0]:null;
  var stk=data.stock&&data.stock.length?data.stock[0]:null;
  var si=data.sim55&&data.sim55.length?data.sim55[0]:null;
  // اختر أحدث مصدر: dashboard أو TVF4
  var tDate=t?pd(cv(t,'submittedAt')):new Date(0);
  var tv4Date=tv4?pd(cv(tv4,'الطابع الزمني','Timestamp')):new Date(0);
  // إذا TVF4 أحدث من dashboard استخدمه كمصدر رئيسي
  var useTV4=tv4&&tv4Date>tDate;

  var dev=data.dev||(useTV4?cv(tv4,'POS number'):t?cv(t,'رقم جهاز POS'):tv4?cv(tv4,'POS number'):tv?fdev(tv):stk?cv(stk,'vs','VS'):'');
  var sim=data.sim||(t?cv(t,'رقم SIM كارت POS'):tv4?cv(tv4,'SIM number'):tv?cv(tv,'رقم السم كارت'):si?cv(si,'ارقام'):'');
  var name=data.name||'';
  var addr=t?cv(t,'العنوان'):'';
  var email=si?cv(si,'الايميل'):'';
  var stat=t?cv(t,'status'):'';
  var date=t?cv(t,'submittedAt'):tv4?cv(tv4,'الطابع الزمني','Timestamp'):tv?cv(tv,'Timestamp'):'';
  var tech=t?cv(t,'اسم الموظف المسؤول'):tv4?cv(tv4,'اسم الموظف','اسم الوظف'):tv?cv(tv,'اسم الوظف'):'';
  var reason=t?cv(t,'سبب الزيارة'):tv4?cv(tv4,'سبب الزيارة/ توزيع'):'';
  var posT=t?cv(t,'جهاز POS'):tv4?cv(tv4,'نوع الجهاز'):tv?cv(tv,'نوع الجهاز'):'';
  var maint=t?cv(t,'صيانة POS'):tv4?cv(tv4,'صيانة جهاز'):'';
  var apps=t?cv(t,'منافس'):tv4?cv(tv4,'المنافسين'):tv?cv(tv,'المنافسين'):'';

// ── Reports ───────────────────────────────────────────────────
function buildRepFilters(){
  var techs=new Set();
  D.dash.forEach(function(r){var t=normTech(cv(r,'اسم الموظف المسؤول'));if(t&&t.length>1)techs.add(t);});
  D.tvf.concat(D.tvfR).forEach(function(r){var t=normTech(cv(r,'اسم الوظف','اسم الموظف'));if(t&&t.length>1)techs.add(t);});
  var sel=document.getElementById('rTe');var cur=sel.value;
  sel.innerHTML='<option value="">الكل</option>';
  Array.from(techs).sort().forEach(function(t){sel.innerHTML+='<option>'+t+'</option>';});
  sel.value=cur;
}

function doRep(){
  if(!loaded){document.getElementById('rres').innerHTML='<div class="empty">⏳ جاري التحميل...</div>';return;}
  var st=document.getElementById('rSt').value;
  var te=document.getElementById('rTe').value;
  var fr=document.getElementById('rFr').value;
  var to=document.getElementById('rTo').value;
  var srch=(document.getElementById('rSrch').value||'').toLowerCase();

  var all=[];
  D.dash.forEach(function(r){
    var n=cv(r,'اسم المطعم');if(!n)return;
    all.push({name:n,date:cv(r,'submittedAt'),tech:normTech(cv(r,'اسم الموظف المسؤول')),status:cv(r,'status'),dev:cv(r,'رقم جهاز POS'),sim:cv(r,'رقم SIM كارت POS'),addr:cv(r,'العنوان'),reason:cv(r,'سبب الزيارة'),note:cv(r,'ملاحظات'),src:'dash'});
  });
  D.tvf.concat(D.tvfR).forEach(function(r){
    var n=cv(r,'اسم المطعم','اسم الوظف');if(!n)return;
    all.push({name:n,date:cv(r,'الطابع الزمني','Timestamp'),tech:normTech(cv(r,'اسم الوظف','اسم الموظف')),status:'',dev:fdev(r)||cv(r,'رقم الجهاز'),sim:cv(r,'رقم السم كارت'),addr:'',reason:cv(r,'سبب الزيارة'),note:cv(r,'ملاحظة'),src:'TVF'});
  });

  var rows=all.filter(function(r){
    if(st&&r.status!==st)return false;
    if(te&&r.tech!==te)return false;
    var ds=pdStr(r.date);
    if(fr&&ds&&ds<fr)return false;
    if(to&&ds&&ds>to)return false;
    if(srch&&!(r.name+' '+r.tech+' '+r.dev+' '+r.note).toLowerCase().includes(srch))return false;
    return true;
  }).sort(function(a,b){return pd(b.date)-pd(a.date);});

  _repData=rows;
  var s={total:rows.length,n:0,w:0,j:0};
  var techCount={};
  var techDays={};  // فني → Set of date strings
  rows.forEach(function(r){
    if(r.status==='نشط')s.n++;else if(r.status==='انتظار')s.w++;else if(r.status==='جديد')s.j++;
    if(r.tech){
      techCount[r.tech]=(techCount[r.tech]||0)+1;
      // حساب الأيام: نأخذ فقط جزء التاريخ بدون الوقت
      if(r.date){
        var d=pd(r.date);
        if(d&&d.getTime()>0){
          var dayKey=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
          if(!techDays[r.tech]) techDays[r.tech]=[];
          if(techDays[r.tech].indexOf(dayKey)<0) techDays[r.tech].push(dayKey);
        }
      }
    }
  });

  // إحصاءات عامة
  var statsHtml=
    '<div class="rstat"><div style="font-size:20px">📊</div><div style="font-size:20px;font-weight:900;color:#60a5fa">'+s.total+'</div><div style="font-size:10px;color:#475569">إجمالي التاسكات</div></div>'+
    '<div class="rstat"><div style="font-size:20px">✅</div><div style="font-size:20px;font-weight:900;color:#4ade80">'+s.n+'</div><div style="font-size:10px;color:#475569">نشط</div></div>'+
    '<div class="rstat"><div style="font-size:20px">⏳</div><div style="font-size:20px;font-weight:900;color:#fbbf24">'+s.w+'</div><div style="font-size:10px;color:#475569">انتظار</div></div>'+
    '<div class="rstat"><div style="font-size:20px">🆕</div><div style="font-size:20px;font-weight:900;color:#93c5fd">'+s.j+'</div><div style="font-size:10px;color:#475569">جديد</div></div>';

  // عدد تاسكات كل فني
  var techList=Object.keys(techCount).sort(function(a,b){return techCount[b]-techCount[a];});
  if(techList.length>0){
    statsHtml+='<div style="grid-column:1/-1;background:#0d1424;border:1px solid #1e3a5f;border-radius:9px;padding:10px;margin-top:4px">';
    statsHtml+='<div style="font-size:11px;color:#475569;margin-bottom:8px">👤 تاسكات كل فني'+(fr?' | من '+fr:'')+(to?' إلى '+to:'')+'</div>';
    statsHtml+='<div style="display:flex;flex-wrap:wrap;gap:7px">';
    techList.forEach(function(tech){
      var days = techDays[tech] ? techDays[tech].length : 0;
      var avg = days > 0 ? (techCount[tech]/days).toFixed(1) : '0';
      statsHtml+='<div style="background:#060a12;border:1px solid #1e293b;border-radius:8px;padding:8px 12px;text-align:center;min-width:100px">'
        +'<div style="font-size:10px;color:#94a3b8;margin-bottom:6px;font-weight:600">'+tech+'</div>'
        +'<div style="display:flex;gap:8px;justify-content:center;align-items:flex-end">'
        +'<div style="text-align:center">'
        +'<div style="font-size:17px;font-weight:900;color:#60a5fa">'+techCount[tech]+'</div>'
        +'<div style="font-size:9px;color:#475569;margin-top:1px">تاسك</div>'
        +'</div>'
        +'<div style="width:1px;background:#1e293b;margin:0 2px;align-self:stretch"></div>'
        +'<div style="text-align:center">'
        +'<div style="font-size:17px;font-weight:900;color:#34d399">'+days+'</div>'
        +'<div style="font-size:9px;color:#475569;margin-top:1px">يوم</div>'
        +'</div>'
        +'<div style="width:1px;background:#1e293b;margin:0 2px;align-self:stretch"></div>'
        +'<div style="text-align:center">'
        +'<div style="font-size:17px;font-weight:900;color:#f59e0b">'+avg+'</div>'
        +'<div style="font-size:9px;color:#475569;margin-top:1px">متوسط/يوم</div>'
        +'</div>'
        +'</div>'
        +'</div>';
    });
    statsHtml+='</div></div>';
  }

  document.getElementById('rstats').innerHTML=statsHtml;

  if(!rows.length){document.getElementById('rres').innerHTML='<div class="empty">لا نتائج</div>';return;}
  var h='<div style="font-size:11px;color:#475569;margin-bottom:8px">'+rows.length+' تاسك</div>';
  rows.forEach(function(r,i){
    h+='<div class="hi" style="cursor:pointer;margin-bottom:6px'+(r.src==='TVF'?';border-color:rgba(139,92,246,.2)':'')+'" onclick="var d=this.querySelector(\'.rd\');d.style.display=d.style.display===\'none\'?\'block\':\'none\'">'
      +'<div class="hr"><span style="font-size:11px;color:#334155;min-width:22px">'+(i+1)+'</span>'
      +'<span style="font-size:13px;font-weight:700;color:#e2e8f0;flex:1">'+r.name+'</span>'
      +(r.dev&&['1','2','3','VB','VE','VS'].indexOf(r.dev)<0?'<span style="font-size:10px;color:#60a5fa">🖥️ '+r.dev+'</span>':'')
      +(r.status?'<span class="bdg '+bdg(r.status)+'">'+r.status+'</span>':'<span style="font-size:9px;color:#c4b5fd">'+r.src+'</span>')
      +'</div>'
      +'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:3px">'
      +(r.date?'<span class="brm">📅 '+fmtDate(r.date)+'</span>':'')
      +(r.tech?'<span class="brm">👤 '+r.tech+'</span>':'')
      +(r.addr?'<span class="brm">📍 '+r.addr+'</span>':'')
      +'</div>'
      +'<div class="rd" style="display:none;margin-top:8px;padding-top:7px;border-top:1px solid #1e293b;font-size:11px">'
      +(r.reason?'<div>🔧 '+r.reason+'</div>':'')
      +(r.note&&r.note!=='—'?'<div>📝 '+r.note+'</div>':'')
      +'</div></div>';
  });
  document.getElementById('rres').innerHTML=h;
}

function resetRep(){['rSt','rTe'].forEach(function(x){document.getElementById(x).value='';});document.getElementById('rFr').value='';document.getElementById('rTo').value='';document.getElementById('rSrch').value='';doRep();}

// ── Export ────────────────────────────────────────────────────
function dlCSV(rows,name){
  var csv='\uFEFF'+rows.map(function(r){return r.map(function(c){return'"'+(c||'').replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));a.download=name;a.click();
}
function expPrefix(){if(!_branches)return;dlCSV([['رقم الجهاز','اسم المطعم','رقم السيم','التاريخ','الحالة']].concat(_branches.map(function(m){return[m.dev,m.name||'',m.sim||'',fmtDate(m.date)||'',m.status||''];})),'devices_'+Date.now()+'.csv');}
function expName(){if(!_branches)return;dlCSV([['اسم المطعم','رقم الجهاز','رقم السيم','التاريخ','الحالة','الفني']].concat(_branches.map(function(br){var t=latestDash(br);return[br.name,t?cv(t,'رقم جهاز POS'):'',t?cv(t,'رقم SIM كارت POS'):'',t?fmtDate(cv(t,'submittedAt')):'',t?cv(t,'status'):'',t?cv(t,'اسم الموظف المسؤول'):''];})),'restaurants_'+Date.now()+'.csv');}
function expSingle(){dlCSV([['اسم المطعم','رقم الجهاز','رقم السيم','التاريخ','الحالة']],[['','','','','']]);}
function expRep(){if(!_repData)return;dlCSV([['اسم المطعم','رقم الجهاز','رقم السيم','التاريخ','الحالة','الفني','العنوان','ملاحظات','المصدر']].concat(_repData.map(function(r){return[r.name,r.dev,r.sim,fmtDate(r.date),r.status,r.tech,r.addr,r.note,r.src];})),'تقرير_'+Date.now()+'.csv');}

loadAll();
</script>
